description: When a module-level boolean flag is set by a signal handler and read inside a loop in a named function, that function must reset the flag to its initial value at entry (before the loop). Without a reset, a second invocation of the function in the same Python process inherits the flag state from the previous run and may exit immediately without performing any work.
