description: When a new hook script is added, `HOOK_SCRIPTS` in `install.py` must be updated to include the new hook type and its script filename. The dict must match the entries in `hooks.json`. Non-plugin users rely on `hamlet install` to register hooks via settings.json; omissions cause silent degraded experience with no error.
