description: Settings that require subsystem initialization (`mcp_port`, `db_path`, `terrain`) must be excluded from the daemon's periodic config reload. Changes to these fields must be detected, logged as warnings, and deferred until the daemon is restarted. Hot-applying them without restarting the affected subsystem leaves the daemon in an inconsistent state.
