description: Integration tests for rendering pipelines (Kitty, or any future graphical backend) must patch only the HTTP transport call (e.g., `urllib.request.urlopen`) and let the full parse→dataclass→render chain execute. Mocking at the dataclass level bypasses `StateFetcher` and cannot catch type-mismatch crashes between the API response shape and the renderer's expectations.
