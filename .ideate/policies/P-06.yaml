description: The graphical backend (Kitty graphics protocol) must use pixel-art sprites with a constrained 16-32 color palette, SNES-era proportions, and zoom-dependent resolution. Self-colored outlines, chibi character proportions, and 3/4 perspective are required for agent sprites. The warm saturated palette and medieval village theme must be consistent with the ASCII backend's thematic identity (GP-3). The backend is implemented as pure Python escape sequences — no C library or ctypes bindings.
