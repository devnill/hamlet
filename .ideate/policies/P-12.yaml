description: "Hook types that can interrupt Claude Code processing (PreToolUse, PreCompact) must not have `\"async\": true` in `hooks.json`. Setting async on a blocking hook causes a Claude Code load error. All other hook types are fire-and-forget and should use `\"async\": true`."
