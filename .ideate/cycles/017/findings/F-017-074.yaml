title: `first.id or None` in `_toggle_follow` is idiomatic but potentially surprising
description: |
  - **File**: `src/hamlet/gui/kitty/app.py:230`
  - **Issue**: `first.id or None` works correctly — empty string becomes None, non-empty string passes through — but the idiom relies on Python's falsy-string behavior rather than explicit `None` check. This is a style note only; behavior is correct.
  - **Suggested fix**: `self._follow_target = first.id if first.id else None` is more explicit.
