title: TUI and Kitty per-item degradation granularity differs
description: "`tui/remote_world_state.py:189-206` (`RemoteWorldState.refresh()`) calls `_parse_agent`, `_parse_structure`, `_parse_village` directly in list comprehensions without per-item exception handling. A single malformed item causes the outer `except Exception` block to fire, discarding the entire category. The Kitty `StateFetcher` uses `_try_parse` per item, so valid items survive even when a neighbor is malformed. This asymmetry is not a spec violation — WI-283 only required Kitty to implement graceful degradation, and the TUI was out of scope for this cycle."
