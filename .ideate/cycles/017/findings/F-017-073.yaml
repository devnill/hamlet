title: `_try_parse` captures all exceptions including programming errors
description: |
  - **File**: `src/hamlet/gui/kitty/state_fetcher.py:20-25`
  - **Issue**: `_try_parse` catches bare `Exception`, which swallows `AttributeError`, `TypeError`, and other bugs that would indicate a programming error rather than malformed data. A `ValueError` (from bad enum values) is the expected failure mode; silently discarding `AttributeError` could mask future regressions in `_parse_agent` itself.
  - **Suggested fix**: Consider catching `(ValueError, KeyError)` specifically, or log the exception at DEBUG level before returning None.
