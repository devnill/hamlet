title: _update_state only reachable in viewer mode
description: |
  - **File**: `src/hamlet/tui/app.py:142-144`
  - **Issue**: `_update_state()` is now called from `_refresh_remote_state()`, which is only scheduled when `_remote_provider is not None`. If HamletApp were ever used without a remote provider, the status bar would remain at zeros.
  - **Impact**: No practical impact — HamletApp is only used in viewer mode (always has remote_provider). The daemon is headless.
  - **Suggested fix**: None needed now. Note for future if embedded daemon mode is added.
