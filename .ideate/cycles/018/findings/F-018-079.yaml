title: WI-290 empty-state fixture uses populated terrain response
description: |
  - **File**: `tests/test_kitty_integration.py` (TestEmptyStatePipeline)
  - **Issue**: The empty-state test uses `daemon_terrain_response.json` (populated terrain) but `daemon_events_empty.json` (empty events). A fully empty daemon would have no pre-generated terrain either, but the terrain is generated server-side from the seed regardless of agent activity, so populated terrain with no agents is a valid state.
  - **Principle**: P-15 (integration tests patch only HTTP transport) — adhered to correctly.
