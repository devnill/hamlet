  # Decision Log — Cycle 4
  
  ## D1: EC1/IR1 (execute permissions) is a false positive
  
  Gap analyst raised that hook scripts may not have execute permissions. Verified: all four hook .py files and start.sh have `-rwxr-xr-x`. This was set in WI-169. Not a real gap.
  
  ## D2: SG1 (server_url not mentioned) promoted to significant
  
  User completed hamlet_init and needs to configure a custom server_url. If they don't know the config key exists, they can't use this feature. Creating WI-173 to add server_url mention to hamlet_init output.
  
  ## D3: SG2 (Path.cwd() correctness) promoted to significant — requires verification
  
  Cannot confirm without runtime testing whether Claude Code sets MCP server cwd correctly. Including in WI-173 as a verification + conditional fix item.
  
  ## D4: MG1 (claude-marketplace CLAUDE.md) addressed in WI-173
  
  Single-line table addition, low effort, worth including in next cycle.
