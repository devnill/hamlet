title: SpriteSheet dataclass is not frozen but cleanup mutates ncvisual to None
description: |
  - **File**: `src/hamlet/gui/notcurses/sprites.py`
  - **Issue**: SpriteSheet is a regular dataclass (not frozen), which is intentional since cleanup sets `sheet.ncvisual = None`. However, this mutation pattern means SpriteSheet instances returned by `get_*_sprite` methods can be silently invalidated after cleanup. Callers holding a reference may blit a None visual.
  - **Suggested fix**: Document that SpriteSheet references are invalidated after cleanup, or return copies rather than cached references.
