title: StructureType.ROAD has no symbol in SymbolConfig
description: |
  - **File**: `src/hamlet/gui/symbol_config.py`
  - **Issue**: `StructureType.ROAD` exists in `world_state/types.py` but is not included in `StructureVisual.symbols`. The existing `symbols.py` also omits it (pre-existing gap), but the SymbolConfig extraction should have caught this.
  - **Impact**: Road structures will KeyError in the renderer if encountered. The Textual backend handles this via a fallback in `get_structure_symbol()` that returns `"="`, but the notcurses renderer uses the config dict directly.
