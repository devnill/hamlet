type: decision_log
cycle: 15
content: |
  # Decision Log — Cycle 015
  
  ## Planning Decisions
  
  ### D1: Design Constraint 1 amended — ASCII default, optional graphical backend
  Amended from "ASCII-only" to allow optional sprite-based backend while preserving ASCII as universal fallback.
  
  ### D2: GP-3 expanded — backend-agnostic thematic consistency
  Dwarf Fortress/ADOM for ASCII, SNES/Stardew Valley for graphical. Medieval village theme shared.
  
  ### D3: Renderer selected via CLI flag with settings-based default
  `--renderer` flag, `settings.renderer` field, `"auto"` detects capability.
  
  ### D4: Notcurses via custom ctypes — no pip/brew dependency
  `ctypes.util.find_library()` at runtime. `NOTCURSES_AVAILABLE` flag gates all code paths.
  
  ### D5: Simple tmux/notcurses split — no passthrough investigation
  tmux → Textual, capable terminals → notcurses.
  
  ### D6: Three zoom levels with blitter modes
  CLOSE (16x16, NCBLIT_PIXEL), MEDIUM (8x8, NCBLIT_2x1), FAR (character, NCBLIT_1x1).
  
  ### D7: Core untouched — scope boundary at renderer layer
  Daemon, event pipeline, WorldStateManager, persistence, hooks unchanged.
  
  ### D8: Visual design conventions established
  Self-colored outlines, chibi characters, 3/4 perspective, warm saturated palette, 16-32 colors.
  
  ## Execution Decisions
  
  ### D9: putstr fg/bg guards use None check (WI-269 rework)
  Changed from truthiness to `is not None` — black (0,0,0) is falsy.
  
  ### D10: Viewport size from plane_dim (WI-269 rework)
  Renderer derives dimensions from actual plane, not viewport_state.size.
  
  ### D11: cleanup() unconditionally destroys ncvisuals (WI-272 rework)
  Removed conditional guard that could leak native handles.
  
  ### D12: Sprite PNGs deliberately absent
  System ships with empty assets/. Graceful degradation validated.
  
  ## Open Questions
  
  ### OQ-1: NotcursesApp terrain endpoint not connected
  Terrain data passed as empty dict. Daemon exposes `/hamlet/terrain/bounds/...` but app doesn't fetch it.
  
  ### OQ-2: StructureType.ROAD missing from SymbolConfig (CRASH PATH)
  Roads are auto-generated by village growth. NotcursesRenderer will KeyError when a road exists. Highest priority actionable finding.
  
  ### OQ-3: SpriteSheet silent invalidation after cleanup
  Dormant while no sprites exist. Becomes live hazard when PNGs are added.
  
  ### OQ-4: destroy_plane return value not checked
  Silent failure on plane destruction could leak resources.
  
  ### OQ-5: No sprite PNG assets
  SNES/16-bit visual experience cannot be evaluated until created.
  
  ### OQ-6: Legend overlay not implemented in notcurses
  `/` keybinding toggles state but nothing renders. Parallels Textual help stub (cycle 013 OQ-5).
  
  ### OQ-7: architecture.md not updated with gui/ module
  Future workers won't know the module exists.
  
  ### OQ-8-9: Carried from cycle 013
  meadow_threshold validation range and TerrainConfig.__post_init__ untested.
  
  ## Cross-References
  
  ### CR1: ROAD symbol gap — active crash path
  spec-reviewer M2 + gap-analyst G1. Roads generated automatically → notcurses KeyError guaranteed in active sessions.
  
  ### CR2: Sprite system completeness
  code-reviewer M1 (silent invalidation) + gap-analyst G2 (no PNGs). Coupled: fix both when sprites are added.
  
  ### CR3: Legend toggle pattern across backends
  gap-analyst G3 parallels cycle 013 OQ-5. Both backends have stub overlay keybindings.
