title: RemoteWorldState interface gap (0.5.1)
content: Fixed `RemoteWorldState` missing `get_viewport_center()` and `update_viewport_center()` — both called by `ViewportManager` but absent from the remote implementation. `get_viewport_center()` returns `None` (fallback to first village); `update_viewport_center()` is a no-op. Version bumped to 0.5.1.
