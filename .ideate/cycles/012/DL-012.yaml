content: |
  # Decision Log — Cycle 012
  
  ## Decisions Made This Cycle
  
  ### D-1: Terrain Legend Enhancement (WI-249)
  - **Context**: User feedback requested legend showing terrain types in the TUI.
  - **Decision**: Add terrain type symbols to the existing LegendOverlay in legend.py. Terrain symbols displayed: `~` water, `^` mountain, `♣` forest, `"` meadow, `.` plain.
  - **Rationale**: Aligns with roguelike convention (Principle 3 — Thematic Consistency). Minimal code change by extending existing legend infrastructure.
  - **Impact**: Legend now shows terrain types when toggled with `/` key in main game TUI.
  - **Work Items**: WI-249
  
  ### D-2: TerrainConfig Parameter System (WI-250)
  - **Context**: User requested editable parameters for terrain generation.
  - **Decision**: Create TerrainConfig dataclass with 27 configurable parameters including octaves, lacunarity, persistence, domain_warp_strength, thresholds, smoothing_passes, forest/lake/ridge params, region params, and water params.
  - **Rationale**: Principle 4 (Modularity for Iteration) requires configurable parameters. Dataclass pattern matches existing code style.
  - **Impact**: All terrain generation behavior is now configurable via TerrainConfig.
  - **Work Items**: WI-250
  
  ### D-3: Config Persistence (WI-251)
  - **Context**: Terrain parameters should persist across sessions.
  - **Decision**: Store terrain config in Settings.terrain dict, persist to ~/.hamlet/config.json, and reconstruct TerrainConfig in app_factory.
  - **Rationale**: Consistent with existing persistence pattern for other settings.
  - **Impact**: Users can customize terrain generation and have preferences saved.
  - **Work Items**: WI-251
  
  ### D-4: Map Viewer Mode Entry Point (WI-252)
  - **Context**: Users need a dedicated mode for terrain exploration and parameter adjustment.
  - **Decision**: Add `hamlet map-viewer` subcommand and `--map-viewer` flag to CLI. Create separate MapApp (Textual App) for terrain-only rendering with parameter panel.
  - **Rationale**: Separates terrain exploration from main game loop. Allows real-time parameter tuning.
  - **Impact**: New entry point `hamlet map-viewer` launches terrain-only viewer.
  - **Work Items**: WI-252
  
  ### D-5: Discrete Zoom Levels (WI-253)
  - **Context**: Users want to view larger terrain areas.
  - **Decision**: Implement 4 discrete zoom levels (1x, 2x, 4x, 8x) in MapViewer. Zoom adjusts how many world cells map to each character cell.
  - **Rationale**: Principle 10 (Scrollable World, Visible Agents). Discrete levels avoid fractional positioning issues.
  - **Impact**: Users can zoom out to see more terrain, zoom in for detail.
  - **Work Items**: WI-253
  
  ### D-6: Biome Region Generation (WI-254)
  - **Context**: User feedback: "The terrain is much too busy, I'd like something a little more realistic where biomes smoothly shift into each other."
  - **Decision**: Add low-frequency fBm noise for macro-scale biome regions. Introduce `region_scale` parameter (50-200 cells) and `region_blending` parameter (0-1) for transition sharpness. Each region has terrain type bias (wet/dry/temperate).
  - **Rationale**: Creates coherent geographic regions rather than scattered cells. Noise-based approach ensures determinism.
  - **Impact**: Terrain now shows large biome regions with gradual transitions.
  - **Work Items**: WI-254
  
  ### D-7: Water Bias Formula Fix (WI-254 Rework)
  - **Context**: Initial water bias formula was inverted — wet regions received minimum bias instead of maximum.
  - **Decision**: Fix formula to `bias_strength * (-biome_char) * 0.5` so wettest regions (biome_char = -1) get maximum water bias.
  - **Rationale**: Wet regions should favor water terrain; original implementation had math error.
  - **Impact**: Water features now cluster correctly in wet biome regions.
  - **Work Items**: WI-254 (rework)
  
  ### D-8: Realistic Water Features (WI-255)
  - **Context**: User requested "rivers, ponds, large lakes" as water features.
  - **Decision**: Implement three water generation methods: `generate_rivers()` following elevation gradients, `generate_ponds()` in lowland areas, and expand existing lake detection. Add `water_percentage_target` parameter for configurable water coverage.
  - **Rationale**: Realistic water features follow elevation (rivers) and fill lowlands (ponds/lakes). Configurable target allows user control.
  - **Impact**: Water features are now varied and geographically coherent.
  - **Work Items**: WI-255
  
  ### D-9: Water Percentage Enforcement (WI-255 Rework)
  - **Context**: `water_percentage_target` parameter was defined but not implemented.
  - **Decision**: Add `_enforce_water_percentage()` method that adjusts water content to match target. Remove isolated water when over target, expand water bodies when under target.
  - **Rationale**: Users need control over overall water coverage in the world.
  - **Impact**: Water coverage now matches configured target percentage.
  - **Work Items**: WI-255 (rework)
  
  ### D-10: Forest Clustering Near Features (WI-256)
  - **Context**: User requested "Forests should cluster around water/features, modeling terrain generation after nature."
  - **Decision**: Implement `forest_water_adjacency_bonus` for preferential seeding near water, `forest_region_bias_strength` for density variation, and `forest_percentage_target` for coverage control.
  - **Rationale**: Creates realistic forest distribution patterns.
  - **Impact**: Forests now cluster near water and follow regional moisture patterns.
  - **Work Items**: WI-256
  
  ### D-11: Terrain Smoothing and Transitions (WI-257)
  - **Context**: Sharp boundaries between terrain types look unrealistic.
  - **Decision**: Implement CA smoothing rules for all terrain types: water isolation, forest expansion/contraction, mountain foothills, meadow-plain transitions. Multiple passes configurable via `smoothing_passes`.
  - **Rationale**: Creates gradual boundaries between similar biomes (meadow/plain) while maintaining distinct features (water isolation).
  - **Impact**: Terrain transitions are now gradual and natural-looking.
  - **Work Items**: WI-257
  
  ### D-12: Noise Library as Optional Dependency
  - **Context**: Perlin noise requires external library; not all users may have it installed.
  - **Decision**: Make `noise` library an optional dependency. Provide seeded random fallback when unavailable. The fallback produces scattered terrain cells (acceptable for environments without noise).
  - **Rationale**: Principle 7 (Graceful Degradation). Installation should work without forcing optional dependencies.
  - **Impact**: Terrain generation works with or without noise library; coherent regions require noise.
  - **Work Items**: WI-232, WI-233 (from prior cycle)
  
  ---
  
  ## Questions Resolved This Cycle
  
  ### Q-1: Should terrain be stored or generated?
  - **Question**: Should terrain be persisted to database or generated on-demand?
  - **Resolution**: Deterministic generation from seed. Persist only the seed in world_metadata table. No terrain data migration needed.
  - **Work Items**: WI-238 (from prior cycle)
  
  ### Q-2: How should villages be placed relative to terrain?
  - **Question**: How should village founding handle terrain passability?
  - **Resolution**: Spiral search from world origin finds first passable terrain position. Villages are not placed on water or mountains.
  - **Work Items**: WI-235 (from prior cycle)
  
  ### Q-3: What happens when noise library is unavailable?
  - **Question**: Should terrain generation fail without noise library?
  - **Resolution**: Graceful degradation to seeded random. Terrain still generates but is less coherent (scattered cells instead of regions).
  - **Work Items**: WI-233 (from prior cycle)
  
  ### Q-4: How should map viewer handle parameter changes?
  - **Question**: Should parameter changes regenerate terrain immediately or require explicit action?
  - **Resolution**: Changes tracked in `_dirty` flag. 'R' key randomizes seed and regenerates. 'S' key saves config. Parameter panel shows current values.
  - **Work Items**: WI-252
  
  ---
  
  ## Open Questions
  
  ### Q-5: Map Viewer Legend Accessibility
  - **Question**: Should the terrain legend be accessible in map viewer mode?
  - **Context**: LegendOverlay exists for main game TUI but is not included in MapApp. Users exploring terrain parameters in map viewer cannot see what symbols represent.
  - **Impact**: Users must memorize terrain symbols or exit map viewer to check legend.
  - **Who answers**: Design decision — add legend toggle to MapApp or embed in status bar.
  - **Consequence of inaction**: Map viewer users lack visual reference for terrain types.
  - **Source**: Gap analysis G1
  
  ### Q-6: Terrain Parameter Validation
  - **Question**: Should TerrainConfig validate parameter ranges?
  - **Context**: Parameters like `region_scale=1` (tiny regions), `octaves=20` (excessive computation), or negative thresholds are accepted without error or warning.
  - **Impact**: Users can configure nonsensical values that produce unexpected behavior or performance issues.
  - **Who answers**: Design decision — add `__post_init__` validation or document acceptable ranges.
  - **Consequence of inaction**: Users may set invalid parameters and get confusing results.
  - **Source**: Gap analysis G2, incremental review WI-254 M1
  
  ### Q-7: Help Toggle in Map Viewer
  - **Question**: Should the `?` keybinding do something visible in map viewer?
  - **Context**: `action_toggle_help()` in MapApp is a no-op with comment "For now, just display a message."
  - **Impact**: Users pressing `?` see no response.
  - **Who answers**: Design decision — implement help overlay or remove binding.
  - **Consequence of inaction**: Users expect help and get nothing.
  - **Source**: Gap analysis G3
  
  ### Q-8: River Minimum Length Configuration
  - **Question**: Should `min_river_length` be configurable?
  - **Context**: Rivers shorter than 3 cells are silently discarded. Threshold is hardcoded at terrain.py:1261.
  - **Impact**: Users cannot control minimum river length through config.
  - **Who answers**: Design decision — add parameter to TerrainConfig or document threshold.
  - **Consequence of inaction**: Short rivers are excluded without user visibility.
  - **Source**: Gap analysis G5
  
  ### Q-9: Map Viewer Save Status Indicator
  - **Question**: Should map viewer show unsaved changes indicator?
  - **Context**: `_dirty` flag tracks unsaved parameter changes but is not displayed in StatusBar.
  - **Impact**: Users cannot see if their changes are saved.
  - **Who answers**: Design decision — add dirty indicator to status bar.
  - **Consequence of inaction**: Users may lose changes if they exit without saving.
  - **Source**: Gap analysis G6
  
  ### Q-10: Water Bias Documentation Accuracy
  - **Question**: Is the documented maximum bias of +/-0.3 accurate?
  - **Context**: Comment states "Max +/-0.3 adjustment" but formula `bias_strength * (-biome_char) * 0.5` with `bias_strength = region_blending * 0.3` produces maximum of +/-0.15 when region_blending=1.0 and biome_char extremes.
  - **Impact**: Documentation does not match implementation. Users configuring region_blending=1.0 expect 0.3 max but get 0.15.
  - **Who answers**: Code fix — update comment or adjust formula.
  - **Consequence of inaction**: Misleading documentation for power users.
  - **Source**: Code quality review S1
  
  ### Q-11: Missing Parameters in Parameter Panel
  - **Question**: Should the parameter panel expose all TerrainConfig parameters?
  - **Context**: Ten parameters (region_scale, region_blending, river_count, pond_count, min_pond_size, max_pond_size, water_percentage_target, forest_water_adjacency_bonus, forest_region_bias_strength, forest_percentage_target) exist in TerrainConfig but not in TERRAIN_PARAMS.
  - **Impact**: WI-252 acceptance criterion "Parameter panel displays all configurable terrain parameters with current values" is not met.
  - **Who answers**: Code fix — add parameters to TERRAIN_PARAMS list.
  - **Consequence of inaction**: Users cannot adjust these parameters through the map viewer UI.
  - **Source**: Code quality review S2, unmet acceptance criterion
  
  ---
  
  ## Cross-Cutting Findings
  
  ### CR1: Terrain Parameter Exposure Gap
  - **Code review**: S2 — Ten TerrainConfig parameters missing from parameter panel.
  - **Spec review**: Pass (architecture adhered, principles followed).
  - **Gap analysis**: G2 — Parameter validation missing; G5 — River minimum length hardcoded.
  - **Connection**: Multiple reviewers identified incomplete parameter exposure. Combined picture: parameters exist in TerrainConfig but are not fully exposed or validated in the UI layer. Partial implementation of WI-250 (expose all parameters) and WI-252 (parameter panel displays all values).
  
  ### CR2: Water Feature Configuration
  - **Code review**: S1 — Water bias formula documentation inaccurate (formula produces 0.15 max, comment says 0.3).
  - **Spec review**: Pass (no principle violation).
  - **Gap analysis**: G5 — River minimum length hardcoded at 3 cells.
  - **Connection**: Water-related parameters have documentation/configuration gaps. Users tuning water features have incomplete control and misleading documentation.
  
  ### CR3: Noise Library Dependency
  - **Code review**: M5 — `generate_water_features` modifies generator state unexpectedly.
  - **Spec review**: Pass (principle 7 graceful degradation documented).
  - **Gap analysis**: G4 — Noise fallback produces incoherent terrain (scattered cells, not regions).
  - **Connection**: The noise library is optional but critical for coherent terrain. When unavailable, the system gracefully degrades but produces terrain that contradicts the user's original feedback about "too busy scattered cells."
