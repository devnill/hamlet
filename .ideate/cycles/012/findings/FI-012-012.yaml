title: `generate_water_features` modifies generator state unexpectedly
description: |
  - **File**: `/Users/dan/code/hamlet/src/hamlet/world_state/terrain.py:1880+`
  - **Issue**: The helper function `generate_water_features` creates a `TerrainGenerator`, then overwrites `generator._seed` and `generator._random` with the provided seed. This modifies the generator's internal state after construction.
  - **Impact**: Unusual pattern, but acceptable for internal helper function.
  - **Suggested fix**: Pass the seed to the `TerrainGenerator` constructor directly.
