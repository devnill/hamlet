title: Incorrect type hint using built-in callable instead of typing.Callable
description: |
  - **File**: `/Users/dan/code/hamlet/src/hamlet/tui/parameter_panel.py:69`
  - **Issue**: The type hints for callback parameters use `callable` (the built-in function) instead of `Callable` from the `typing` module. While this works at runtime due to Python's dynamic typing, it is semantically incorrect and will fail static type checkers like mypy.
  - **Suggested fix**: Change `callable` to `Callable` and import it from `typing`:
    ```python
    # At top of file
    from typing import TYPE_CHECKING, Callable
  
    # In __init__ signature
    def __init__(
        self,
        terrain_config: "TerrainConfig",
        on_change: Callable | None = None,
        on_save: Callable | None = None,
        on_seed_change: Callable | None = None,
    ) -> None:
    ```
