title: Water adjacency bonus is a flat probability
description: |
  - **File**: `/Users/dan/code/hamlet/src/hamlet/world_state/terrain.py:1151-1159`
  - **Issue**: The `forest_water_adjacency_bonus` (default 0.3) is added as a flat probability bonus to all seeds adjacent to water, regardless of distance or water body size.
  - **Impact**: Seeds near ponds and rivers get the same bonus, which may not be the intended behavior.
  - **Suggested fix**: Consider scaling bonus by water body size or proximity.
