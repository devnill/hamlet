title: Weak Test for Region Scale Effect
description: |
  - **File**: `/Users/dan/code/hamlet/tests/test_terrain.py:2256-2258`
  - **Issue**: The test `test_region_scale_affects_region_size` asserts `assert small_scale_variations >= 0` and `assert large_scale_variations >= 0`. These assertions only verify the code runs without error; they do not verify that smaller region_scale actually creates smaller/more varied regions.
  - **Impact**: The test provides false confidence. A buggy implementation that ignores region_scale would pass this test.
  - **Suggested fix**: Replace with an assertion that verifies the expected behavior. For example, assert that `small_scale_variations > large_scale_variations` or measure the actual region size by sampling bias values at different distances.
