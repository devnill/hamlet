title: Dead Code and Misleading Comment in scroll Method
description: |
  - **File**: `/Users/dan/code/hamlet/src/hamlet/tui/map_viewer.py:95-99`
  - **Issue**: The `scroll` method contains variables `scaled_delta_x` and `scaled_delta_y` that are assigned but never actually scaled, and a comment that claims "Scale scroll delta inversely with zoom for consistent feel" when no scaling occurs.
  - **Impact**: The misleading comment suggests functionality that is not implemented. Users may experience faster perceived scrolling at higher zoom levels since moving 1 world cell at zoom=8 moves 8 screen cells, while moving 1 world cell at zoom=1 moves 1 screen cell.
  - **Suggested fix**: Either implement the scaling (divide delta by zoom factor) or remove the misleading comment and dead variables:
    ```python
    def scroll(self, delta_x: int, delta_y: int) -> None:
        """Scroll the viewport by the given delta in world coordinates."""
        self.center_x += delta_x
        self.center_y += delta_y
    ```
