title: `test_view_renderer_argument_choices` does not test "kitty"
description: |
  - **File**: `tests/test_cli.py:107`
  - **Issue**: The test iterates over `("auto", "textual")` and does not include `"kitty"`. The acceptance criterion says CLI `--renderer` choices must include `"kitty"`. While the parser definition at `src/hamlet/cli/__init__.py:113` does include it, the test does not exercise or assert it.
  - **Impact**: If someone removes `"kitty"` from the choices list, this test still passes. The criterion is only partially verified.
  - **Suggested fix**: Add `"kitty"` to the tuple: `for choice in ("auto", "textual", "kitty"):`.
