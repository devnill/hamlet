title: `encode_image_display` hardcodes placement ID `p=1`
description: |
  - **File**: `src/hamlet/gui/kitty/protocol.py`
  - **Issue**: The Kitty protocol uses `(image_id, placement_id)` pairs to uniquely identify placements. Hardcoding `p=1` means the same image displayed at two locations simultaneously will have the second placement replace the first. When sprites are eventually displayed, each placement needs a unique ID.
  - **Suggested fix**: Accept an optional `placement_id` parameter or auto-increment placement IDs.
