title: `uploaded` field on `SpriteHandle` is always `False` and can never be `True`
description: |
  - **File**: `/Users/dan/code/hamlet/src/hamlet/gui/kitty/sprites.py:94-99`
  - **Issue**: `SpriteHandle` is frozen, so `uploaded` is set at construction time and cannot be changed. `load_sprite` always constructs the handle with `uploaded=False`. `get_upload_sequence` adds the ID to `_uploaded_ids` but never updates the handle (and cannot, since it is frozen). The `uploaded` field therefore has no effect on runtime behavior and carries misleading state — a caller who checks `handle.uploaded` after calling `get_upload_sequence` will always see `False`.
  - **Suggested fix**: Either remove the `uploaded` field from `SpriteHandle` and expose upload status through a `SpriteManager` method (`is_uploaded(handle) -> bool` delegating to `_uploaded_ids`), or document clearly that the field reflects state at load time only and is always `False`. Removing it is cleaner and removes the misleading affordance.
