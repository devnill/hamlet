title: `render_mode` typed as `str` with no enforcement
description: |
  - **File**: `src/hamlet/gui/kitty/zoom.py:16`
  - **Issue**: The field comment says `"sprite" or "character"` but the type is plain `str`. Nothing prevents callers constructing a `ZoomConfig` with an invalid `render_mode` value (e.g., `"pixel"`). Given that the set of valid values is small and closed, a `Literal["sprite", "character"]` annotation would make the constraint machine-checkable.
  - **Suggested fix**:
    ```python
    from typing import Literal
  
    @dataclass(frozen=True)
    class ZoomConfig:
        level: ZoomLevel
        tile_pixels: int
        render_mode: Literal["sprite", "character"]
    ```
