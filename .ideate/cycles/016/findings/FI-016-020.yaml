title: `__main__.main()` declared `-> None` but calls `sys.exit()` directly instead of returning an int
description: |
  - **File**: `src/hamlet/__main__.py:153`
  - **Issue**: `main()` in `__main__.py` returns `None` and calls `sys.exit()` internally, while `cli.main()` (called by `__main__.main()` at line 185) returns `int`. The two entry points have inconsistent conventions. `cli/__init__.py` correctly returns an integer and its caller does `sys.exit(cli_main(args))`. The `__main__.main()` approach hard-codes the exit rather than letting the caller decide.
  - **Suggested fix**: This is a pre-existing inconsistency, not introduced by this WI, but it is worth noting. No immediate change required unless a caller needs the return value.
