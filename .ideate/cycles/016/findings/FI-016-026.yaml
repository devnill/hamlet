title: `_toggle_follow` stores empty string as follow target, breaking toggle-off
description: |
  - **File**: `src/hamlet/gui/kitty/app.py:234`
  - **Issue**: `first.get("id", "")` returns `""` when the agent dict has no `"id"` key. The truthiness check `if self._follow_target` at line 229 evaluates `""` as `False`, so a second `f` keypress enters the `elif` branch instead of the `if` branch, and follow mode cannot be toggled off.
  - **Suggested fix**: After assigning `self._follow_target`, add `if not self._follow_target: self._follow_target = None` so the toggle invariant is maintained.
