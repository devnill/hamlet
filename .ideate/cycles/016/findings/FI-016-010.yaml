title: Terrain and agent cells at screen row 0 are silently clobbered by the HUD
description: |
  - **File**: `src/hamlet/gui/kitty/renderer.py:122-124`, `:253-255`
  - **Issue**: `_in_bounds` permits `sy == 0`, so terrain/structure/agent content can be written to row 0 before `_render_hud` overwrites it with the status bar. The content is lost with no visible artefact but it wastes work and indicates incomplete guard logic.
  - **Suggested fix**: Either exclude row 0 from `_in_bounds` (`return 0 < sy < self._rows and 0 <= sx < self._cols` — note: bottom HUD rows similarly need exclusion) or document that HUD rows are reserved and enforce that at the bounds check.
