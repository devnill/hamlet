title: `flush()` is never called after `_output.write()`
description: |
  - **File**: `src/hamlet/gui/kitty/renderer.py:101`, `:109`
  - **Issue**: `render_frame` and `cleanup` both call `self._output.write(...)` without a subsequent `flush()`. If `output` is buffered (e.g., `sys.stdout` in block-buffered mode when redirected), frames may not appear until the buffer fills or the program exits.
  - **Suggested fix**: Add `self._output.flush()` after each `self._output.write(...)` call, or require callers to use a line-buffered / unbuffered stream and document this in the docstring.
