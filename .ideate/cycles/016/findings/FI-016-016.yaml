title: `hamlet.gui.kitty.app.KittyApp` does not exist
description: |
  - **File**: `src/hamlet/__main__.py:149`
  - **Issue**: `_run_viewer_kitty` does `from hamlet.gui.kitty.app import KittyApp`. There is no `app.py` file in `src/hamlet/gui/kitty/`. The directory contains `__init__.py`, `protocol.py`, `renderer.py`, `sprites.py`, and `zoom.py`. The renderer class is `KittyRenderer`, not `KittyApp`.
  - **Impact**: Any code path that resolves to renderer=="kitty" raises `ModuleNotFoundError` at runtime. This includes `hamlet view --renderer kitty`, `hamlet view` when `KITTY_AVAILABLE` is `True`, and the bare `hamlet` command in the same conditions. The feature is completely broken.
  - **Suggested fix**: Either create `src/hamlet/gui/kitty/app.py` with a `KittyApp` class that wraps `KittyRenderer` and implements a `run()` method, or change the import in `_run_viewer_kitty` to use the existing `KittyRenderer` directly. Because this is an acceptance criterion ("renderer=='kitty' calls KittyApp directly"), the missing file needs to be created.
