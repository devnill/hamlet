title: Terrain parse error inside fetch terminates processing of remaining keys
description: |
  - **File**: `src/hamlet/gui/kitty/state_fetcher.py:87-103`
  - **Issue**: The `try/except Exception: pass` block spans the entire terrain fetch including the `for k, v in raw.items()` loop. If `int(parts[0])` or `int(parts[1])` raises `ValueError` for any key (e.g., `"1.5,2"`), the outer `except` catches it and discards all terrain keys that follow that entry in the response. The existing `test_skips_malformed_keys` test uses `"bad_key"` which is filtered by the `len(parts) == 2` check before `int()` is called, so this bug is not covered.
  - **Suggested fix**: Wrap only the `int()` conversions in a per-iteration `try/except ValueError: continue` inside the loop, keeping the outer `except Exception` only around the HTTP fetch and JSON parse.
