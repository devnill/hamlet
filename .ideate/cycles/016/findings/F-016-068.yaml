title: `SpriteHandle.uploaded` field is always False and misleading
description: |
  - **File**: `src/hamlet/gui/kitty/sprites.py:18`
  - **Issue**: `SpriteHandle` is frozen and constructed with `uploaded=False`. The actual upload state is tracked in `SpriteManager._uploaded_ids`. The `uploaded` field on the handle is never True and misleads callers who check it. The rework already added `is_uploaded()` as the proper API, making the field redundant.
  - **Suggested fix**: Remove `uploaded` from `SpriteHandle` in a future cycle.
