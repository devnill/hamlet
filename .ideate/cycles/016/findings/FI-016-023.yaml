title: `check_health` does not close the HTTP response
description: |
  - **File**: `src/hamlet/gui/kitty/state_fetcher.py:40-42`
  - **Issue**: `urllib.request.urlopen(...)` returns an `http.client.HTTPResponse` that holds an open socket. The code reads `.status` and lets the object go out of scope without closing it. All three `fetch_snapshot` requests correctly use `with` blocks; `check_health` does not.
  - **Suggested fix**: `with urllib.request.urlopen(f"{self._base_url}/hamlet/health", timeout=2) as r: return r.status == 200`
