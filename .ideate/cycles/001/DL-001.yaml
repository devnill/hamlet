  # Decision Log — Cycle 001 (Comprehensive Review)
  
  This decision log synthesizes all decisions made from project inception through the comprehensive review on 2026-03-21.
  
  ---
  
  ## Planning Decisions
  
  ### D-P1: Python/Textual Technology Stack
  - **When**: Planning — interview Q17-Q20
  - **Decision**: Use Python with Textual framework for the TUI
  - **Rationale**: Research confirmed Python/Textual offers async-native architecture matching the MCP SDK, hot reload for iteration speed, and official MCP SDK support
  - **Alternatives considered**: Go/bubbletea, Rust/ratatui — rejected due to weaker MCP ecosystem
  - **Implications**: Enables MCP integration via official Python SDK, constrains async patterns to asyncio
  
  ### D-P2: SQLite for Persistence
  - **When**: Planning — interview Q22
  - **Decision**: Use SQLite for persistent world state
  - **Rationale**: User confirmed SQLite is ideal for structured queries and durability
  - **Implications**: Single-file database, transaction support, no external service required
  
  ### D-P3: Single Persistent MCP Server
  - **When**: Planning — interview Q22
  - **Decision**: One MCP server process receives events from multiple Claude Code sessions
  - **Rationale**: Global persistent map tracks all projects; villages are project-scoped
  - **Implications**: Hook scripts must be lightweight; server must handle concurrent sessions
  
  ### D-P4: Agent Type Inferred from Tool Patterns
  - **When**: Planning — interview Q28
  - **Decision**: No dedicated agent spawning hooks; type must be inferred from PreToolUse/PostToolUse patterns
  - **Rationale**: Claude Code has no explicit agent spawning hooks; minimal processing required
  - **Implications**: AgentInferenceEngine implements TYPE_RULES pattern matching
  
  ### D-P5: Write-Behind Queue for Persistence
  - **When**: Planning — interview Q17 (architecture design)
  - **Decision**: Non-blocking persistence with write-behind queue
  - **Rationale**: 30 FPS simulation loop cannot block on SQLite writes
  - **Implications**: Checkpoint mechanism for graceful shutdown durability
  
  ### D-P6: HTTP Transport for Hook Events
  - **When**: Execution — architecture refinement
  - **Decision**: Hook scripts POST events to HTTP endpoint rather than using stdio MCP transport
  - **Rationale**: Hook scripts run outside venv with stdlib only; urllib.request is simpler than MCP client
  - **Implications**: MCPServer implements aiohttp HTTP routes (`/hamlet/event`, `/hamlet/health`, `/hamlet/state`)
  
  ### D-P7: Daemon/Viewer Split Architecture
  - **When**: Execution — WI-126/WI-127
  - **Decision**: Separate `hamlet daemon` (persistent background process) and `hamlet` (viewer TUI)
  - **Rationale**: TUI must connect to running daemon; single persistent server maintains world state
  - **Implications**: RemoteWorldState class fetches state via HTTP from daemon
  
  ### D-P8: launchd Service Management
  - **When**: Refinement — interview Q105-Q118 (2026-03-20)
  - **Decision**: Implement `hamlet service` subcommand group for macOS launchd integration
  - **Rationale**: Production daemon runs as launchd service; users need start/stop/status commands
  - **Implications**: Uses modern `launchctl bootstrap`/`bootout` APIs
  
  ### D-P9: Deterministic Terrain from Seed
  - **When**: Refinement — interview Q136-Q144 (2026-03-21)
  - **Decision**: Generate terrain deterministically from seed; persist only seed in world_metadata table
  - **Rationale**: Breaking change to data model; must be done before geography-dependent features
  - **Implications**: TerrainGrid regenerates on load; no migration needed for terrain data
  
  ### D-P10: Terrain Types and Passability
  - **When**: Refinement — interview Q139-Q144
  - **Decision**: Five terrain types (WATER, MOUNTAIN, FOREST, MEADOW, PLAIN); WATER and MOUNTAIN are impassable for structures
  - **Rationale**: Foundational for future movement systems; provides visual richness
  - **Implications**: Village placement spiral-searches for passable terrain; structure creation validates passability
  
  ---
  
  ## Execution Decisions
  
  ### D-E1: asyncio.Lock for WorldStateManager (Not threading.RLock)
  - **When**: Execution — architecture document
  - **Decision**: Use `asyncio.Lock` for WorldStateManager mutations, not `threading.RLock`
  - **Rationale**: All WorldStateManager methods are async coroutines
  - **Implications**: Lock is not re-entrant; locked methods must not call other locked methods
  
  ### D-E2: Graceful Degradation (GP-7) Throughout
  - **When**: Execution — all work items
  - **Decision**: All exception handlers log and continue; never crash the application
  - **Rationale**: Idle game should remain running even if individual operations fail
  - **Implications**: Persistence write failures logged at DEBUG; hook scripts exit 0 in finally block
  
  ### D-E3: Hook Script Pattern — sys.exit(0) in finally
  - **When**: Execution — WI-090 through WI-091
  - **Decision**: All hooks use `sys.exit(0)` in finally block after posting to server
  - **Rationale**: Silent failure; GP-7 graceful degradation for observability platform
  - **Implications**: Tests must catch SystemExit or mock sys.exit
  
  ### D-E4: Village Auto-Expansion with Roads
  - **When**: Execution — WI-045, WI-216
  - **Decision**: When village population exceeds threshold, spawn new village connected by road
  - **Rationale**: Thematic consistency (villages grow into cities); Principle 5 (project-based villages)
  - **Implications**: ExpansionManager draws roads and calls found_village()
  
  ### D-E5: Agent ZOMBIE State on Startup
  - **When**: Execution — WI-208
  - **Decision**: Reset all agent states to ZOMBIE when daemon starts
  - **Rationale**: Cannot know if agents from previous session are still active
  - **Implications**: Active agents re-announce via hooks; zombie state is default
  
  ### D-E6: Multi-cell Structure Rendering
  - **When**: Execution — WI-229, WI-230
  - **Decision**: Structures with size_tier >= 2 render as 2x2 or 3x3 boxes using ASCII box-drawing characters (`+`, `-`, `|`)
  - **Rationale**: Thematic consistency with Dwarf Fortress/Nethack conventions
  - **Implications**: Agents in footprint cells are displaced via spiral search
  
  ### D-E7: Size Tier Based on Work Units
  - **When**: Execution — WI-227, WI-228
  - **Decision**: Structures accumulate work units; tier computed from thresholds (0/100/300/600)
  - **Rationale**: Visual progression from foundation to wood to stone
  - **Implications**: StructureUpdater calls upgrade_structure_tier when threshold crossed
  
  ### D-E8: stop_reason Behavioral Differentiation
  - **When**: Execution — WI-197, WI-199
  - **Decision**: Stop with tool_use or end_turn reason triggers IDLE transition; Stop without these reasons triggers ZOMBIE
  - **Rationale**: Distinguishes intentional session end from abnormal termination
  - **Implications**: Agent state management in inference engine
  
  ---
  
  ## Review Decisions
  
  ### D-R1: Architecture Deviation — HTTP vs stdio MCP Transport
  - **When**: Review — spec-adherence D1
  - **Decision**: Accept HTTP endpoint implementation; do not migrate to stdio MCP transport
  - **Rationale**: Hook scripts outside venv cannot use MCP client; HTTP is pragmatic for this architecture
  - **Implications**: Documented as deviation in spec-adherence review
  
  ### D-R2: Architecture Deviation — PersistenceFacade Pattern
  - **When**: Review — spec-adherence D2
  - **Decision**: Accept facade with write-behind queue; no direct save methods on public API
  - **Rationale**: Cleaner separation of concerns; matches actual implementation
  - **Implications**: PersistenceFacade.queue_write() queues operations; checkpoint() forces durability
  
  ### D-R3: Architecture Deviation — Delegated Simulation
  - **When**: Review — spec-adherence D3
  - **Decision**: Accept SimulationEngine delegation to AgentUpdater, StructureUpdater, ExpansionManager, AnimationManager
  - **Rationale**: Good modularity (GP-4) even if not shown in spec diagram
  - **Implications**: Each updater encapsulates its domain logic
  
  ### D-R4: Test Environment State Dependency Accepted
  - **When**: Review — code-quality S2
  - **Decision**: Accept that service tests fail when hamlet is already installed locally
  - **Rationale**: Tests mock `_launchctl` but actual install checks plist files; CI environments pass
  - **Implications**: Document as known limitation; developers with local installs may see test failures
  
  ### D-R5: Terrain Not Included in State Endpoint
  - **When**: Review — gap-analysis G1
  - **Decision**: Accept separate `/terrain/{x}/{y}` endpoint; no terrain_grid in state response
  - **Rationale**: Performance optimization opportunity, not correctness issue
  - **Implications**: RemoteWorldState makes separate HTTP requests for terrain data
  
  ---
  
  ## Cross-References
  
  ### CR1: Multi-cell Structure Placement and Agent Displacement
  - **Code review**: WI-229 C1/C2 — duplicate displacement targets and fallback guarantees
  - **Spec review**: No deviation — implementation matches architecture
  - **Gap analysis**: No gap — implicit requirement addressed
  - **Connection**: WI-228 and WI-229 ran concurrently; both delivered tier upgrade logic. Final implementation in WI-229 correctly handles agent displacement with spiral search and 200-ring fallback.
  
  ### CR2: Terrain Passability and Village Placement
  - **Code review**: No finding — implemented correctly
  - **Spec review**: U4 — terrain module properly follows module spec
  - **Gap analysis**: IR1-IR5 — all implicit requirements addressed
  - **Connection**: Village placement uses spiral search for passable terrain; structure creation validates passability. Terrain seed persisted, grid regenerated deterministically.
  
  ### CR3: Protocol Interface Completeness
  - **Code review**: WI-218 C1/S1 — WorldStateProtocol missing 5 methods
  - **Spec review**: N3 — protocol defines subset of manager methods
  - **Gap analysis**: SG1 — missing found_village, create_structure, etc.
  - **Connection**: Protocol interfaces (protocols.py) define consumer-facing API. When RemoteWorldState needed these methods, gap was identified and fixed. Protocol is intentionally subset of full manager API.
  
  ### CR4: WorldStateManager Lock Safety
  - **Code review**: Consistent `async with self._lock` pattern; deadlock avoidance documented
  - **Journal**: Multiple rework items fixed lock ordering issues
  - **Connection**: Review confirmed no re-entrant lock calls; methods that acquire lock do not call other locked methods.
  
  ---
  
  ## Open Questions
  
  ### Q-1: Should size_tier_thresholds be persisted?
  - **Source**: Decision log cycle 001 (refine-13)
  - **Impact**: Restarting daemon loses runtime tuning of structure tier thresholds
  - **Who answers**: User decision — acceptable for MVP?
  - **Consequence of inaction**: Users may be surprised that config changes don't persist; tuning is session-local
  
  ### Q-2: Should state endpoint include terrain_grid?
  - **Source**: Gap analysis G1
  - **Impact**: RemoteWorldState makes separate HTTP requests for terrain data; performance cost
  - **Who answers**: Technical investigation — measure performance impact
  - **Consequence of inaction**: Viewer startup may be slower; multiple round trips for initial world state
  
  ### Q-3: Should tests use deterministic terrain seeding?
  - **Source**: Code quality S1, M1
  - **Impact**: E2E persistence tests fail intermittently when hardcoded positions land on mountains/water
  - **Who answers**: Technical investigation — add terrain_seed fixture or mock validation
  - **Consequence of inaction**: Flaky tests reduce confidence in CI; developers see false failures
  
  ### Q-4: Should noise library path be tested?
  - **Source**: Gap analysis T2
  - **Impact**: `_generate_with_noise` method never executed in tests because noise library not installed
  - **Who answers**: Technical investigation — mock HAS_NOISE=True in tests
  - **Consequence of inaction**: Production behavior with noise library is untested
  
  ### Q-5: Should write loop have failure escalation?
  - **Source**: Code quality S3
  - **Impact**: Persistent database errors cause indefinite data loss with only logging
  - **Who answers**: Design review — add failure counter or circuit breaker?
  - **Consequence of inaction**: Silent data loss if database errors become persistent; no monitoring alert
  
  ### Q-6: Should PLANNER be reserved in AgentType?
  - **Source**: Interview (refinement 2026-03-16)
  - **Impact**: PLANNER type exists in enum but no inference rule distinguishes it
  - **Who answers**: User decision — reserve or add TYPE_RULE?
  - **Consequence of inaction**: PLANNER agents appear as GENERAL; may confuse users expecting distinct color
  
  ### Q-7: Viewport center not persisted across restarts
  - **Source**: Interview (refinement 2026-03-16)
  - **Impact**: Viewport resets to first village on daemon restart
  - **Who answers**: Deferred — acceptable for MVP
  - **Consequence of inaction**: User experience degraded on restart; must scroll to previous location
  
  ### Q-8: Terrain not shown in architecture diagram
  - **Source**: Gap analysis D1
  - **Impact**: Documentation only — terrain module exists in specs/plan/modules/terrain.md but not in main architecture
  - **Who answers**: Documentation update — add TerrainGrid to World State module diagram
  - **Consequence of inaction**: Documentation drift from implementation; onboarding confusion
  
  ---
  
  ## Metrics Summary
  
  - **Work items reviewed**: 212 total (001-231 across all cycles)
  - **Critical findings**: 0
  - **Significant findings**: 0
  - **Minor findings**: 3 (pre-existing asyncio decorators, fallback edge case, config persistence)
  - **Convergence**: ACHIEVED
  
  ---
  
  ## Summary
  
  The hamlet codebase demonstrates strong adherence to the 11 guiding principles. Key architectural decisions (daemon/viewer split, HTTP transport, write-behind persistence) are pragmatic choices that enable the core vision while remaining consistent with the theme. The comprehensive review found no critical or significant issues remaining.
  
  Terrain generation (WI-232-WI-239) integrates cleanly with existing systems. Multi-cell structure rendering (WI-229-WI-230) follows roguelike conventions. Village expansion (WI-216-WI-219) correctly seeds new settlements.
  
  Open questions are minor optimizations and documentation updates; none block release or core functionality.
