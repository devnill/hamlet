  # WI-259: Add Missing Parameters to Parameter Panel
  
  ## Objective
  Expose all TerrainConfig parameters in the map viewer parameter panel.
  
  ## Finding Addressed
  S2: Ten TerrainConfig parameters missing from TERRAIN_PARAMS. This is an unmet acceptance criterion from WI-252.
  
  ## File Scope
  - `src/hamlet/tui/parameter_panel.py` — TERRAIN_PARAMS list
  
  ## Implementation Notes
  Add the following parameters to TERRAIN_PARAMS with appropriate min/max/step values:
  
  ```python
  ("region_scale", "Region Scale", 50.0, 200.0, 10.0, "Biome region size (cells)"),
  ("region_blending", "Region Blend", 0.0, 1.0, 0.1, "Biome transition sharpness"),
  ("river_count", "Rivers", 0, 10, 1, "Number of rivers (0=auto)"),
  ("pond_count", "Ponds", 0, 20, 1, "Number of ponds (0=auto)"),
  ("min_pond_size", "Min Pond", 3, 10, 1, "Minimum pond cells"),
  ("max_pond_size", "Max Pond", 10, 30, 1, "Maximum pond cells"),
  ("water_percentage_target", "Water %", 0.0, 50.0, 1.0, "Target water coverage"),
  ("forest_water_adjacency_bonus", "Water Bonus", 0.0, 1.0, 0.1, "Forest spawn bonus near water"),
  ("forest_region_bias_strength", "Forest Bias", 0.0, 1.0, 0.1, "Regional forest density bias"),
  ("forest_percentage_target", "Forest %", 0.0, 50.0, 1.0, "Target forest coverage"),
  ```
  
  Reference existing TERRAIN_PARAMS entries for format.
  
  ## Acceptance Criteria
  - All 10 parameters displayed with labels and descriptions
  - Parameters have appropriate min/max ranges matching TerrainConfig defaults
  - Parameters update the terrain when changed
