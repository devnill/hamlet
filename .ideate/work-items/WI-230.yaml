notes: |
  # WI-230 Implementation Notes
  
  ## src/hamlet/tui/world_view.py
  
  Replace the simple `struct_by_pos` single-cell dict with multi-cell expansion.
  
  Change the struct_by_pos type to `dict[tuple[int, int], tuple[str, str]]` (char, color):
  
  ```python
  struct_by_pos: dict[tuple[int, int], tuple[str, str]] = {}
  for structure in self._structures:
      pos = structure.position
      tier = getattr(structure, 'size_tier', 1)
      symbol = get_structure_symbol(structure)
      color = get_structure_color(structure)
      if tier <= 1:
          struct_by_pos[(pos.x, pos.y)] = (symbol, color)
      else:
          half = tier - 1
          for dx in range(-half, half + 1):
              for dy in range(-half, half + 1):
                  cx, cy = pos.x + dx, pos.y + dy
                  is_top = (dy == -half)
                  is_bottom = (dy == half)
                  is_left = (dx == -half)
                  is_right = (dx == half)
                  is_corner = (is_top or is_bottom) and (is_left or is_right)
                  is_h_edge = (is_top or is_bottom) and not is_corner
                  is_v_edge = (is_left or is_right) and not is_corner
                  if is_corner:
                      char, char_color = "+", color
                  elif is_h_edge:
                      char, char_color = "-", color
                  elif is_v_edge:
                      char, char_color = "|", color
                  else:
                      char, char_color = symbol, color  # interior + center
                  struct_by_pos[(cx, cy)] = (char, char_color)
  ```
  
  Update the render loop:
  
  ```python
  elif key in struct_by_pos:
      char, style = struct_by_pos[key]
      text.append(char, style=style)
  ```
  
  Agent rendering still checked first (agent takes priority).
  
  ## Tests in tests/test_tui_world_view.py
  
  1. Create a structure at Position(5,5) with size_tier=2. Mock _structures. Call render().
     Parse the rendered Text. Verify:
     - (4,4)="+", (5,4)="-", (6,4)="+"
     - (4,5)="|", (5,5)=structure_symbol, (6,5)="|"
     - (4,6)="+", (5,6)="-", (6,6)="+"
  
  2. Add an agent at Position(4,5). Verify that position renders as the agent symbol, not "|".
  
  Note: render() returns a rich.text.Text object. You can iterate its spans or convert to plain
  string to extract characters at specific positions. Alternatively, compute the expected grid
  line-by-line from bounds.
