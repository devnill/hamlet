  # WI-261: Refactor Bounds Calculation
  
  ## Objective
  Remove duplicate bounds calculation logic by using shared utility.
  
  ## Finding Addressed
  S4: Bounds calculation duplicated between map_viewer.py and coordinates.py.
  
  ## File Scope
  - `src/hamlet/tui/map_viewer.py` — get_visible_bounds method
  - `src/hamlet/viewport/coordinates.py` — get_visible_bounds function
  
  ## Implementation Notes
  The `get_visible_bounds` logic exists in both:
  1. `map_viewer.py:66-87` — calculates bounds for map viewer
  2. `coordinates.py:108-132` — shared utility function
  
  Refactor MapViewer to use the shared utility:
  
  ```python
  from hamlet.viewport.coordinates import get_visible_bounds, BoundingBox, Size
  
  def get_visible_bounds(self) -> "BoundingBox":
      viewport_size = Size(self._viewport_width, self._viewport_height)
      center = Position(self.center_x, self.center_y)
      return get_visible_bounds(center, viewport_size, self.zoom)
  ```
  
  Note: MapViewer currently has zoom support that coordinates.py may need to account for. Verify both implementations produce equivalent results after refactoring.
  
  ## Acceptance Criteria
  - MapViewer.get_visible_bounds() calls shared utility from coordinates.py
  - No duplicate bounds calculation logic in map_viewer.py
