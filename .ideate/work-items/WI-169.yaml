notes: |
  # WI-169 Notes: Fix plugin execution and path verification
  
  ## Addresses
  - Gap C1: Hook scripts not guaranteed executable
  - Gap C2: start.sh uses ${BASH_SOURCE[0]} but invoked via sh
  - CQ C1: plugin.json mcpServers path ambiguity
  
  ## Hook Script Permissions
  
  Run `chmod +x` on all four scripts:
  - `/Users/dan/code/hamlet/hooks/pre_tool_use.py`
  - `/Users/dan/code/hamlet/hooks/post_tool_use.py`
  - `/Users/dan/code/hamlet/hooks/notification.py`
  - `/Users/dan/code/hamlet/hooks/stop.py`
  
  These are invoked as direct executables by Claude Code via hooks.json ("type": "command"). Without +x, EACCES is returned and hooks silently never fire.
  
  ## start.sh Fix
  
  Current code in `/Users/dan/code/hamlet/mcp/start.sh`:
  ```bash
  SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
  ```
  
  `BASH_SOURCE` is bash-only. mcp.json invokes via `"command": "sh"`. Fix options:
  1. Change shebang to `#!/usr/bin/env bash` AND update mcp.json to use `"command": "bash"` instead of `"sh"`
  2. Use `$0` instead: `SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"` — works in POSIX sh
  
  Option 2 is simpler (no mcp.json change needed). Use `$0`.
  
  ## plugin.json Path Verification
  
  Current paths in `/Users/dan/code/hamlet/.claude-plugin/plugin.json`:
  - `"mcpServers": "./.claude-plugin/mcp.json"`
  - `"hooks": "./hooks/hooks.json"`
  
  Claude Code likely resolves these from the repo root (where `.claude-plugin/` lives), which would make both paths correct. Compare against another plugin's plugin.json structure to confirm. If the paths are wrong, fix to be correct relative to the resolution root.
  
  Also update `"author": {"name": "hamlet"}` to a real author name (minor M1 from gap-analysis).
