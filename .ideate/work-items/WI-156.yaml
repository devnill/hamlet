  # WI-156: Fix get_hooks_dir() path off-by-one in install.py
  
  ## Context
  WI-141 fixed install.py to write nested array hook format, but the path resolution for get_hooks_dir() uses .parent×6 (or similar) from the install.py file location, which resolves one level too high — reaching /Users/dan/code instead of /Users/dan/code/hamlet.
  
  ## Existing Code
  - `src/hamlet/cli/commands/install.py` — get_hooks_dir() function (or similar)
  
  ## Fix
  Read install.py to find the current path resolution. Fix to use correct number of .parent traversals:
  - install.py is at: src/hamlet/cli/commands/install.py
  - Project root is at: /Users/dan/code/hamlet/ (or wherever the repo root is)
  - From install.py: .parent×4 = project root (src/hamlet/cli/commands → src/hamlet/cli → src/hamlet → src → project root)
  
  Alternatively, use a more robust approach:
  ```python
  import importlib.resources
  # Or use __file__ relative path:
  PROJECT_ROOT = Path(__file__).parent.parent.parent.parent
  ```
  
  Or use a config value from settings.
  
  ## Notes
  - Read install.py before modifying
  - Verify the correct .parent count by counting directory levels
  - The Claude Code settings hooks directory depends on the OS; check existing code for that path
