  # WI-191: README and QUICKSTART accuracy update

  ## Context

  README.md and QUICKSTART.md were written for an earlier version. Since then: 11 new hook types added (total 15), plugin installation introduced, `hamlet install` is the primary setup method, `is_plugin_active()` detects plugin mode.

  ## README.md changes needed

  Read the current README.md first to assess what exists.

  Expected gaps:
  - Hook count: likely says 4 hooks, should say 15
  - CLI commands: may be missing `hamlet view`, `hamlet daemon`, or `hamlet uninstall`
  - Plugin installation: likely not mentioned
  - Python version requirement: verify it says 3.12+

  Update to reflect:
  - All 15 hook types are covered (list them or link to hooks.json)
  - Two installation paths: (1) `hamlet install` for settings.json injection, (2) Claude Code plugin (automatic if plugin is installed — `is_plugin_active()` detects this)
  - Full CLI command list with brief descriptions
  - Python 3.12+ requirement

  ## QUICKSTART.md changes needed

  Read the current QUICKSTART.md first.

  The likely issue: shows a manual JSON block for configuring hooks in settings.json with only 4 hook types. This is both outdated (15 hooks now) and unnecessary (use `hamlet install`).

  Replace manual hook JSON example with:
  ```
  hamlet install
  ```
  Note that if the hamlet plugin is installed, hooks are already registered — `hamlet install` will detect this and skip.

  Keep the "Start the daemon" step. Keep the "hamlet init" step. Remove or clearly mark-as-legacy the manual JSON configuration approach.

  ## Do not rewrite everything

  Preserve structure. Only update sections that are factually incorrect for v0.4.0. Do not add new sections not requested.
