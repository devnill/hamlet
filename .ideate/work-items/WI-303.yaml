notes: |
  ## WI-303: Migrate Overlapping Villages

  Add migration in `load_from_persistence()` to reposition overlapping villages.

  ### Approach

  1. Detect overlaps: villages with `center == (0,0)` or same position as another
  2. Sort by structure count (descending) - larger villages stay closer to origin
  3. For each overlapping village, use `find_village_position()` to place it
  4. Update bounds to reflect new position
  5. Persist changes

  ### Code Location

  Add after existing migrations in `WorldStateManager.load_from_persistence()`:

  ```python
  # Migrate overlapping villages
  await self._migrate_overlapping_villages()
  ```
