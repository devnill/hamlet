notes: |
  # WI-268: Renderer protocol and symbol config extraction
  
  ## Implementation Notes
  
  ### RendererProtocol
  Define in `src/hamlet/gui/renderer_protocol.py` using `typing.Protocol`:
  - `render_frame(viewport_state, agents, structures, terrain_data, event_log)`
  - `cleanup()`
  
  Check actual types in `hamlet.viewport.coordinates` and `hamlet.world_state.types`.
  
  ### SymbolConfig extraction
  Create `src/hamlet/gui/symbol_config.py` with frozen dataclasses:
  - `AgentVisual`: symbol ("@"), colors dict (AgentType -> color), zombie_color
  - `StructureVisual`: symbols dict, stage_symbols, material_colors
  - `TerrainVisual`: symbols dict (terrain type -> char), colors dict
  - `SymbolConfig`: agent, structure, terrain
  
  `default_config()` creates SymbolConfig with exact values from current `symbols.py`.
  
  ### symbols.py refactor
  Replace module-level dicts with references to `default_config()`. All public exports must continue to work identically. The `get_*` rendering helpers remain in symbols.py.
