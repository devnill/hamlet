notes: |
  # WI-170 Notes: Fix server_url plumbing and hamlet_init onboarding

  ## Addresses
  - Gap S1: server_url from hamlet_init never read by hooks
  - Gap S2: No onboarding guidance after plugin install

  ## server_url Fix

  Current `find_server_url()` in all four hook scripts reads only from `~/.hamlet/config.json`:
  ```python
  def find_server_url() -> str:
      default = "http://localhost:8080/hamlet/event"
      try:
          config_path = Path.home() / ".hamlet" / "config.json"
          if config_path.exists():
              data = json.loads(config_path.read_text())
              return data.get("server_url", default)
      except Exception:
          pass
      return default
  ```

  `hamlet_init` (mcp/server.py) writes `server_url` to `<project>/.hamlet/config.json`. But the hooks never read this file for server_url.

  Fix: Extend find_server_url() to also check the project config using the same upward traversal as find_config(). Precedence: project config server_url → global config server_url → hardcoded default.

  Or more simply: merge into find_config() to return a triple (project_id, project_name, server_url) — this avoids duplicating the traversal. The traversal already happens in find_config(); server_url can be extracted from the same config file at the same time.

  ## hamlet_init Response Fix

  Current response in `/Users/dan/code/hamlet/mcp/server.py`:
  ```python
  text=f"Created {config_path}:\n{json.dumps(config, indent=2)}"
  ```

  Add next-step instructions:
  ```
  Created {config_path}:
  {json}

  Next steps:
  1. Start the hamlet daemon: hamlet daemon
  2. Open the viewer: hamlet
  ```

  This satisfies P11 (low-friction setup) by giving the user actionable next steps immediately after initialization.

  ## Note on hook duplication (M2 from code-quality)
  find_server_url() is duplicated across all four hook scripts. This WI changes it in all four. Consider whether to extract to a shared module — but the lean-client principle (P2) and the constraint against complex hook scripts suggests keeping each hook self-contained. The duplication is a known trade-off.
