notes: |
  # WI-121: Hook server URL — dynamic port from config, no hardcoded 8080
  
  ## Context
  
  All four hook scripts hardcode `SERVER_URL = "http://localhost:8080/hamlet/event"` as a module-level constant. WI-116 wired `settings.mcp_port` to the MCP server, but did not update hook scripts. If a user configures `mcp_port: 9090` in their settings, the install health check passes (it uses the configured port), but all hook events are silently dropped (hooks still POST to port 8080).
  
  ## Fix
  
  **Approach**: Add `server_url` to `~/.hamlet/config.json` during `hamlet install`. Hook scripts read `server_url` from config at startup, falling back to the hardcoded default if not found.
  
  This extends the existing `find_config()` pattern without adding complexity — hooks already call `find_config()` for project identity.
  
  ### Step 1: install.py — write server_url to ~/.hamlet/config.json
  
  In `install_command()`, after validating the server is running, write (or update) `~/.hamlet/config.json` with the `server_url`:
  
  ```python
  import json
  from pathlib import Path
  
  hamlet_config_path = Path.home() / ".hamlet" / "config.json"
  try:
      existing = json.loads(hamlet_config_path.read_text()) if hamlet_config_path.exists() else {}
  except Exception:
      existing = {}
  existing["server_url"] = f"http://localhost:{settings.mcp_port}/hamlet/event"
  hamlet_config_path.parent.mkdir(parents=True, exist_ok=True)
  hamlet_config_path.write_text(json.dumps(existing, indent=2))
  ```
  
  Note: `~/.hamlet/config.json` is different from the per-project `.hamlet/config.json`. The global one stores the server URL; per-project ones store project_id and project_name. The existing `find_config()` in hooks traverses project directories — we need a separate lookup for the global config.
  
  ### Step 2: All four hook scripts — read server_url at startup
  
  Add a `find_server_url()` function to each hook script (alongside `find_config()`):
  
  ```python
  def find_server_url() -> str:
      """Read server_url from ~/.hamlet/config.json, fallback to default."""
      default = "http://localhost:8080/hamlet/event"
      try:
          config_path = Path.home() / ".hamlet" / "config.json"
          if config_path.exists():
              data = json.loads(config_path.read_text())
              return data.get("server_url", default)
      except Exception:
          pass
      return default
  ```
  
  Replace the module-level constant:
  ```python
  # Before:
  SERVER_URL = "http://localhost:8080/hamlet/event"
  
  # After: computed at runtime in main()
  ```
  
  In `main()`, call `find_server_url()` at the start:
  ```python
  def main():
      try:
          server_url = find_server_url()   # dynamic, not module constant
          hook_input = json.load(sys.stdin)
          project_id, project_name = find_config()
          ...
          req = urllib.request.Request(
              server_url,                  # use server_url here
              ...
          )
  ```
  
  ### Step 3: Ensure idempotency of install_command()
  
  If `install_command()` is run multiple times, the `server_url` in `~/.hamlet/config.json` should be updated to reflect the current `settings.mcp_port`. The dict merge approach above handles this correctly.
  
  ## Key files
  
  - `src/hamlet/cli/commands/install.py` — install_command(), validate_mcp_server_running()
  - `hooks/pre_tool_use.py` — add find_server_url(), update main()
  - `hooks/post_tool_use.py` — add find_server_url(), update main()
  - `hooks/notification.py` — add find_server_url(), update main()
  - `hooks/stop.py` — add find_server_url(), update main()
  
  ## Important: consistency with find_config()
  
  `find_config()` traverses from the project working directory upward, looking for `.hamlet/config.json` in any parent directory. `find_server_url()` reads only from `~/.hamlet/config.json` (the global user config). These are two different configs with two different purposes:
  
  - Per-project `.hamlet/config.json`: `project_id`, `project_name`
  - Global `~/.hamlet/config.json`: `server_url`, and any other global settings
  
  Do not merge them — `find_config()` should not read `server_url` (it traverses project dirs, not home). `find_server_url()` should only read from home.
  
  ## Verification
  
  After this fix:
  1. User runs `hamlet install` → `~/.hamlet/config.json` gets `server_url` written
  2. Hooks call `find_server_url()` → read the configured URL
  3. If user changes `mcp_port` and re-runs `hamlet install` → URL is updated automatically
  4. If config missing (fresh install before running `hamlet install`) → hooks fall back to default `http://localhost:8080/hamlet/event`
