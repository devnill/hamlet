notes: |
  # WI-273: Notcurses viewer app and entry point

  ## Implementation Notes

  ### NotcursesApp
  - Constructor takes remote_state + viewport (same as HamletApp pattern)
  - `async run()`: init notcurses, create renderer + sprite manager, enter 30fps loop
  - Each frame: poll input (non-blocking), refresh remote state, update viewport, render, sleep(1/30)
  - Cleanup in finally: renderer.cleanup(), sprite_mgr.cleanup(), bindings.stop()

  ### Input handling
  Non-blocking via `get_nonblocking()`. Key mappings:
  - q=quit, h/left=scroll_left, l/right=scroll_right, k/up=scroll_up, j/down=scroll_down
  - f=follow (toggle, same logic as HamletApp — find most recent active agent)
  - /=legend toggle, +/==zoom_in, -=zoom_out

  ### CLI wiring (cli/__init__.py)
  - Add `--renderer` to view subparser: choices=["auto", "textual", "notcurses"]
  - Modify `_view_command`: call resolve_renderer, dispatch to NotcursesApp or HamletApp
  - Also modify bare `hamlet` (no subcommand) to respect renderer setting

  ### __main__.py
  Add `_run_viewer_notcurses(base_url)` mirroring `_run_viewer` but using NotcursesApp. Still uses RemoteStateProvider + RemoteWorldState for data.

  ### Tests
  Mock bindings entirely. Test input dispatch: create app with mock state/viewport, call _handle_input with mock NcInput, verify scroll/follow/zoom calls.
