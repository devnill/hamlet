  # WI-275: Remove notcurses backend
  
  ## Context
  notcurses 3.0.17 segfaults with Python 3.14 on ARM64 macOS. The backend (WI-267–274) is structurally complete but unusable at runtime. Full removal.
  
  ## Implementation
  
  Delete the entire `gui/notcurses/` directory and its test files. Update four files to remove notcurses references:
  
  **detect.py** — Replace body of `detect_renderer()` with `return "textual"`. Remove the notcurses import.
  
  **settings.py** — Change `valid_renderers` to `{"auto", "textual"}`.
  
  **cli/__init__.py**:
  - Delete `_launch_notcurses_subprocess()` function
  - Remove `if renderer == "notcurses"` branches in `_view_command` and `main`
  - Change `--renderer` choices to `["auto", "textual"]`
  
  **__main__.py**:
  - Delete `_run_viewer_notcurses()` function
  - Remove `if renderer == "notcurses"` branch in `main()`
  
  These are temporary stubs — WI-280 adds Kitty equivalents.
  
  ## Verification
  ```bash
  rm -rf src/hamlet/gui/notcurses/
  rm tests/test_notcurses_app.py tests/test_notcurses_bindings.py tests/test_notcurses_renderer.py
  grep -r "notcurses" src/hamlet/ --include="*.py" | grep -v __pycache__  # should be empty
  pytest
  ```
