  # WI-126: Create daemon mode entry point
  
  ## Context
  Daemon mode runs all backend components (HTTP server, event processing, inference, simulation, persistence) without a TUI. It runs as a long-lived background process, logging to `~/.hamlet/hamlet.log`.
  
  ## Existing Code to Reference
  - `src/hamlet/__main__.py` — current monolithic `_run_app()`. The daemon command extracts the backend portion of this setup (everything except HamletApp and ViewportManager).
  - `src/hamlet/config/settings.py` — `Settings.load()`, `Settings.mcp_port`, `Settings.tick_rate`
  - `src/hamlet/config/paths.py` — `ensure_hamlet_dir()`, `HAMLET_DIR`
  - `src/hamlet/persistence/facade.py` — `PersistenceFacade`
  - `src/hamlet/world_state/manager.py` — `WorldStateManager`
  - `src/hamlet/mcp_server/server.py` — `MCPServer` (modified by WI-125 to accept `animation_manager`)
  - `src/hamlet/event_processing/event_processor.py` — `EventProcessor`
  - `src/hamlet/inference/engine.py` — `AgentInferenceEngine`
  - `src/hamlet/simulation/engine.py` — `SimulationEngine`
  - `src/hamlet/simulation/animation.py` — `AnimationManager`
  - `src/hamlet/cli/__init__.py` — `main()` function, subparser registration
  
  ## Implementation
  
  ### `src/hamlet/cli/commands/daemon.py`
  
  ```python
  async def _run_daemon(port: int) -> None:
      # ensure ~/.hamlet/ exists
      ensure_hamlet_dir()
      # configure file logging to ~/.hamlet/hamlet.log
      logging.basicConfig(
          filename=str(HAMLET_DIR / "hamlet.log"),
          level=logging.INFO,
          format="%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      )
  
      # initialize components (same order as __main__.py)
      settings = Settings.load()
      persistence = PersistenceFacade(...)
      await persistence.start()
      world_state = WorldStateManager(persistence)
      await world_state.load_from_persistence()
      animation_manager = AnimationManager()
      mcp_server = MCPServer(world_state=world_state, animation_manager=animation_manager, port=port)
      event_processor = EventProcessor(queue=mcp_server.event_queue, ...)
      inference_engine = AgentInferenceEngine(world_state=world_state, ...)
      event_processor.subscribe(inference_engine.process_event)
      sim_engine = SimulationEngine(world_state=world_state, animation_manager=animation_manager, ...)
  
      await mcp_server.start()
      await event_processor.start()
      await sim_engine.start()
  
      print(f"Hamlet daemon started on port {port}")
  
      # wait for shutdown signal
      shutdown_event = asyncio.Event()
      loop = asyncio.get_running_loop()
      for sig in (signal.SIGINT, signal.SIGTERM):
          loop.add_signal_handler(sig, shutdown_event.set)
  
      await shutdown_event.wait()
  
      # shutdown in reverse order
      await sim_engine.stop()
      await event_processor.stop()
      await mcp_server.stop()
      await persistence.stop()
      print("Hamlet daemon stopped")
  
  def daemon_command(args) -> int:
      settings = Settings.load()
      port = getattr(args, "port", None) or settings.mcp_port
      asyncio.run(_run_daemon(port))
      return 0
  ```
  
  ### CLI Registration
  In `src/hamlet/cli/__init__.py`, add:
  ```python
  daemon_parser = subparsers.add_parser("daemon", help="Run hamlet backend daemon")
  daemon_parser.add_argument("--port", type=int, help="Override MCP port")
  daemon_parser.set_defaults(command="daemon")
  ```
  
  In the dispatch block:
  ```python
  elif parsed_args.command == "daemon":
      from hamlet.cli.commands.daemon import daemon_command
      return daemon_command(parsed_args)
  ```
  
  ## Notes
  - Animation manager needs to be accessible to MCPServer for the `/hamlet/state` endpoint (WI-125). Wire `animation_manager` into both `MCPServer.__init__` and `SimulationEngine`.
  - The daemon does NOT start `HamletApp`, `ViewportManager`, or any Textual code.
  - Shutdown signal handling: `loop.add_signal_handler` is the asyncio-safe way to register signals.
  - Log file path: `Path.home() / ".hamlet" / "hamlet.log"`.
