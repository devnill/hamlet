  # WI-280: Detection, settings, and CLI updates for Kitty

  ## Context
  Wires the Kitty backend into the existing detection, settings, and CLI infrastructure. Replaces temporary stubs from WI-275.

  ## detect.py
  ```python
  def detect_renderer() -> str:
      try:
          from hamlet.gui.kitty import KITTY_AVAILABLE
          if KITTY_AVAILABLE:
              return "kitty"
      except Exception:
          pass
      return "textual"
  ```

  ## __main__.py
  ```python
  def _run_viewer_kitty(base_url: str) -> int:
      from hamlet.gui.kitty.app import KittyApp
      return KittyApp(base_url).run()
  ```
  No subprocess isolation needed — pure Python.

  ## cli/__init__.py
  - `--renderer` choices: `["auto", "textual", "kitty"]`
  - `renderer == "kitty"` branch calls `KittyApp(url).run()` directly

  ## Test updates
  - `test_renderer_detect.py`: monkeypatch `hamlet.gui.kitty.KITTY_AVAILABLE`
  - `test_settings.py`: `"kitty"` valid, `"notcurses"` invalid
