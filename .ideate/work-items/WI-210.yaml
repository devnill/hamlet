  # WI-210 Implementation Notes: Agent despawn infrastructure
  
  ## Context
  
  WI-211 (inference engine despawn logic) will call `WorldStateManager.despawn_agent()` to
  remove agents from both in-memory state and the database. This work item adds that
  infrastructure. It depends on WI-208 because both touch `world_state/manager.py`.
  
  ## WorldStateManager.despawn_agent()
  
  Add a new async method to `src/hamlet/world_state/manager.py`:
  
  ```python
  async def despawn_agent(self, agent_id: str) -> None:
      """Remove an agent from world state and queue its deletion from persistence."""
      async with self._lock:
          agent = self._state.agents.pop(agent_id, None)
          if agent is None:
              return  # no-op if already gone
          # Free grid position
          try:
              self._grid.vacate(agent.position)
          except Exception:
              pass
          # Remove from village's agent_ids
          village = self._state.villages.get(agent.village_id)
          if village and agent_id in village.agent_ids:
              village.agent_ids.remove(agent_id)
      # Queue DB delete outside the lock (persistence is async-safe)
      await self._persistence.delete_agent(agent_id)
  ```
  
  Check how `_grid.vacate()` (or equivalent) works in
  `src/hamlet/world_state/grid.py` — the method name may differ. Look for the
  method that frees a position/removes an occupant.
  
  ## PersistenceFacade.delete_agent()
  
  Add to `src/hamlet/persistence/facade.py`:
  
  ```python
  async def delete_agent(self, agent_id: str) -> None:
      """Queue deletion of an agent record from the database."""
      await self.queue_write("agent_delete", agent_id, {"id": agent_id})
  ```
  
  Then add the handler in `src/hamlet/persistence/writer.py` (or wherever
  `queue_write` dispatch lives) to execute:
  ```sql
  DELETE FROM agents WHERE id = ?
  ```
  
  Follow the existing write operation pattern — find how other entity types are
  written/deleted and follow the same dispatch/execute pattern.
  
  ## Tests
  
  In `tests/test_world_state_manager.py`:
  - Mock `_persistence.delete_agent` (or the write queue)
  - Call `despawn_agent(agent_id)` with a known agent
  - Assert: agent not in `get_all_agents()`, grid position freed, village agent_ids updated
  - Call `despawn_agent("nonexistent")` — assert no exception raised
  
  In `tests/test_persistence_facade.py`:
  - Verify `delete_agent` queues the correct write operation
