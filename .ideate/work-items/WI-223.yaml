  # WI-223 Implementation Notes
  
  ## Context
  
  Test coverage gaps from Q-15. Need parametrized coverage over all 15 HookType values for
  EventProcessor.process_event and branch tests for specific handle_event branches.
  
  ## tests/test_event_processor.py
  
  ### Parametrized HookType test
  
  ```python
  @pytest.mark.parametrize("hook_type_str", [ht.value for ht in HookType])
  async def test_process_event_all_hook_types(hook_type_str):
      processor = EventProcessor(...)
      raw = {
          "session_id": "sess-1",
          "project_id": "proj-1",
          "hook_type": hook_type_str,
      }
      event = await processor.process_event(raw)
      assert event.hook_type == HookType(hook_type_str)
      assert event.session_id == "sess-1"
  ```
  
  ## tests/test_world_state_manager.py
  
  ### SessionStart branch test
  
  Call handle_event with HookType.SessionStart, project_id="p1", session_id="s1".
  Verify project and session exist in state.
  
  ### SessionEnd branch test
  
  Pre-populate an agent with session_id="s1" and state=ACTIVE.
  Call handle_event with HookType.SessionEnd, session_id="s1".
  Verify agent state is IDLE.
  
  ### SubagentStart branch test
  
  Pre-populate a session. Call handle_event with HookType.SubagentStart, session_id="s1".
  Verify an agent was created in the session.
  
  ### TaskCompleted branch test
  
  Pre-populate a session with an agent that has a valid village_id.
  Call handle_event with HookType.TaskCompleted.
  Verify add_work_units was called (structure work_units increased).
  
  Do NOT add @pytest.mark.asyncio decorators (asyncio_mode = "auto").
