notes: |
  # WI-272: Sprite asset system and PNG loading
  
  ## Implementation Notes
  
  ### Naming convention
  PNGs in `src/hamlet/gui/notcurses/assets/`:
  - `terrain_{type}_{size}.png` (e.g., terrain_water_16.png)
  - `structure_{type}_{stage}_{size}.png`
  - `agent_{type}_{frame}_{size}.png`
  
  ### SpriteManager
  - `load_sprite(path, w, h)` — calls `bindings.visual_from_file`, returns SpriteSheet (ncvisual=None on failure)
  - `get_terrain_sprite(type, zoom)` — compute filename, cache lookup, load
  - Missing sprites return None — no exceptions
  - `cleanup()` — destroy all ncvisuals
  
  ### Graceful degradation
  Core design principle: works with zero PNGs. Renderer falls back to characters.
  
  ### assets/README.md
  Document naming conventions, size requirements (16x16 and 8x8), RGBA format, 16-32 color palette.
