  # WI-239: RemoteWorldState terrain methods
  
  ## Summary
  Add terrain query methods to `RemoteWorldState` for the TUI viewer. The viewer needs terrain data but connects to the daemon via HTTP.
  
  ## Implementation
  
  ### src/hamlet/tui/remote_world_state.py
  
  Add terrain methods:
  
  ```python
  async def get_terrain_at(self, x: int, y: int) -> "TerrainType":
      """Return terrain type at position. RemoteWorldState fetches terrain from daemon."""
      data = await self._fetch_state(f"/terrain/{x}/{y}")
      terrain_str = data.get("terrain", "plain")
      return TerrainType(terrain_str)
  
  async def is_passable(self, x: int, y: int) -> bool:
      """Check if position is passable."""
      data = await self._fetch_state(f"/terrain/{x}/{y}")
      return data.get("passable", True)
  ```
  
  ### src/hamlet/mcp_server/server.py (or appropriate HTTP endpoint)
  
  Add terrain endpoint to HTTP API:
  
  ```python
  # In MCPServer routes
  async def handle_terrain_request(self, request: web.Request) -> web.Response:
      x = int(request.match_info["x"])
      y = int(request.match_info["y"])
      terrain = await self._world_state.get_terrain_at(x, y)
      return web.json_response({
          "terrain": terrain.value,
          "passable": terrain.passable,
      })
  
  # Add route: app.router.add_get("/terrain/{x}/{y}", handle_terrain_request)
  ```
  
  ### src/hamlet/tui/app.py
  
  Update `RemoteWorldState` instantiation to include terrain:
  
  ```python
  # The TUI already has a RemoteWorldState instance
  # WorldView will call get_terrain_at on it
  ```
  
  ## Acceptance Criteria
  
  - `RemoteWorldState.get_terrain_at(x, y)` returns `TerrainType` fetched from daemon
  - `RemoteWorldState.is_passable(x, y)` returns boolean fetched from daemon
  - HTTP endpoint `/terrain/{x}/{y}` returns JSON with `terrain` and `passable` fields
  - Daemon's `WorldStateManager` handles terrain queries via protocol
  - A test verifies `RemoteWorldState.get_terrain_at` makes correct HTTP request
  - A test verifies daemon endpoint returns correct terrain data
