notes: |
  # WI-114: Inference engine — fix active_tools counter and project entity creation
  
  ## Context
  
  Two independent bugs in `src/hamlet/inference/engine.py`:
  
  ### Bug 1: active_tools never decremented
  
  `SessionState.active_tools` is incremented at `engine.py:117` in `_handle_pre_tool_use`. It is never decremented in `_handle_post_tool_use`. After the first PreToolUse event, `active_tools >= 1` permanently.
  
  The spawn detection logic at line 152 checks `session.active_tools > 0`. Because `active_tools` never returns to 0 after the first event, every subsequent PreToolUse triggers `_detect_spawn`, meaning every tool call after the first one appears to spawn a new agent. Combined with the second bug (pending_tools accumulating), the agent count grows without bound.
  
  `session.pending_tools` is a dict keyed by `event.id` containing `PendingTool` entries. Entries are added in `_handle_pre_tool_use` but never removed. Over a session lifetime this grows without bound.
  
  ### Bug 2: get_or_create_project never called
  
  `_handle_pre_tool_use` calls `get_or_create_session` and `get_or_create_agent` but never calls `get_or_create_project`. The project entity is never created. Multiple sessions for the same `project_id` may land in different placeholder villages (the fallback village creation in `get_or_create_agent` at manager.py:274-287 creates a new village each time if no project entity exists). The global project map is never populated.
  
  ## Fix for active_tools
  
  In `_handle_post_tool_use`, after the existing type inference logic, add:
  
  ```python
  # Decrement active_tools (never below 0)
  if session.active_tools > 0:
      session.active_tools -= 1
  
  # Evict the matching pending tool entry
  # Match oldest pending tool for this session with the same tool_name
  tool_name = event.tool_name or ""
  matching_key = None
  oldest_timestamp = None
  for key, pending in session.pending_tools.items():
      if pending.tool_name == tool_name:
          if oldest_timestamp is None or pending.timestamp < oldest_timestamp:
              oldest_timestamp = pending.timestamp
              matching_key = key
  if matching_key is not None:
      del session.pending_tools[matching_key]
  ```
  
  `PendingTool` has a `timestamp` field (added in WI-106). If it does not, match by tool_name and remove the first found. Do not crash if no match exists.
  
  ## Fix for get_or_create_project
  
  In `_handle_pre_tool_use`, before the call to `get_or_create_session`, add:
  
  ```python
  await self._world_state.get_or_create_project(event.project_id, event.project_name)
  ```
  
  The method signature at `manager.py:134` is `async def get_or_create_project(self, project_id: str, project_name: str) -> Project`. It already handles the case where the project exists (returns existing). Just calling it is sufficient — the returned Project object does not need to be used here.
  
  ## Key locations
  
  - `engine.py:117` — `session.active_tools += 1` (PreToolUse)
  - `engine.py:152` — `if session.active_tools > 0:` (spawn detection)
  - `engine.py:92-102` — `_handle_pre_tool_use` body (add get_or_create_project call here)
  - `engine.py` — `_handle_post_tool_use` body (add decrement and eviction here)
  - `inference/types.py` — `SessionState`, `PendingTool` dataclass definitions (check field names)
