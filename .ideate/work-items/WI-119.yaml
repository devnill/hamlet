  # WI-119: Visualization fixes — animation colors, legend, dead code cleanup

  ## Context

  Four minor issues identified in Cycle 004 review, all in the visualization domain:

  1. `AGENT_BASE_COLORS` in `simulation/animation.py` omits `AgentType.EXECUTOR` — falls back to `"white"` during zombie animation instead of the canonical `"red"`.
  2. `AGENT_BASE_COLORS` entry for `AgentType.PLANNER` uses `"green"` but `inference/types.py` and `symbols.py` both use `"dark_green"`.
  3. `inference/colors.py` exports `blend_color` and `get_display_color` — suspected dead code from a superseded zombie rendering approach. Must confirm and delete if unused.
  4. `tui/legend.py` omits PLANNER agent type row.
  5. `world_state/manager.py:_seed_initial_structures` relies on undocumented asyncio scheduling assumption — needs a comment.

  ## Fix 1: AGENT_BASE_COLORS in animation.py

  Current state at `simulation/animation.py:18-25`:
  ```python
  AGENT_BASE_COLORS: dict[AgentType, str] = {
      AgentType.RESEARCHER: "cyan",
      AgentType.CODER: "yellow",
      AgentType.PLANNER: "green",    # WRONG: should be "dark_green"
      AgentType.ARCHITECT: "magenta",
      AgentType.TESTER: "blue",
      AgentType.GENERAL: "white",
      # AgentType.EXECUTOR: MISSING
  }
  ```

  Changes:
  - Add `AgentType.EXECUTOR: "red"` to the dict (after TESTER or at end)
  - Change `AgentType.PLANNER: "green"` to `AgentType.PLANNER: "dark_green"`

  ## Fix 2: inference/colors.py — confirm dead code, delete

  Check whether any module imports from `inference/colors.py`:
  ```bash
  grep -r "from hamlet.inference.colors" src/hamlet/
  grep -r "import colors" src/hamlet/inference/
  ```

  If no callers exist (expected), delete the file. If callers exist, document them and leave the file.

  ## Fix 3: tui/legend.py — add PLANNER row

  Current legend row for agents section (approximate):
  ```
  "│  [cyan]@[/cyan] Researcher  [cyan](cyan)[/cyan]                          │\n"
  "│  [yellow]@[/yellow] Coder       [yellow](yellow)[/yellow]                       │\n"
  "│  [red]@[/red] Executor    [red](red)[/red]                          │\n"
  "│  [magenta]@[/magenta] Architect   [magenta](magenta)[/magenta]                     │\n"
  "│  [blue]@[/blue] Tester      [blue](blue)[/blue]                         │\n"
  "│  [white]@[/white] General     [white](white)[/white]                        │\n"
  ```

  Add a PLANNER row using `dark_green`. Insert between Coder and Executor (or after General — choose a consistent ordering that matches TYPE_COLORS):
  ```
  "│  [dark_green]@[/dark_green] Planner    [dark_green](dark_green)[/dark_green]                     │\n"
  ```

  Note: The legend is a raw string — verify column alignment with surrounding rows. The box is 47 characters wide.

  ## Fix 4: world_state/manager.py — asyncio comment

  Find `_seed_initial_structures` call site in `get_or_create_project` (after the lock is released). Add a comment:

  ```python
  # Note: _seed_initial_structures is called outside self._lock intentionally.
  # It calls create_structure which re-acquires self._lock; asyncio locks are
  # not reentrant. The check-then-act in _seed_initial_structures (is_occupied
  # read before lock) is safe here because asyncio is single-threaded — no
  # context switch occurs between the check and the lock acquire (no await).
  _seed_initial_structures(village_to_seed)
  ```

  Same comment (or similar) at the second call site in `get_or_create_agent`.

  ## Key files

  - `src/hamlet/simulation/animation.py:18-25` — AGENT_BASE_COLORS dict
  - `src/hamlet/inference/colors.py` — check callers then delete
  - `src/hamlet/tui/legend.py:58-81` — render() string
  - `src/hamlet/world_state/manager.py` — _seed_initial_structures call sites
