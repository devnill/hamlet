  # WI-270: Settings and CLI integration for renderer selection

  ## Implementation Notes

  ### Settings changes
  Add `renderer: str = "auto"` after terrain field.
  Validate in `_validate()`: must be one of `{"auto", "textual", "notcurses"}`.
  Update docstring example.

  ### detect.py
  - `detect_renderer()`: try importing NOTCURSES_AVAILABLE, return "notcurses" if True else "textual"
  - `resolve_renderer(cli_arg, settings_value)`: cli_arg wins if not None, "auto" calls detect_renderer(), otherwise use settings_value directly

  ### Note
  The `--renderer` CLI argument and `_view_command` changes are in WI-273. This item only modifies settings.py and creates detect.py.
