notes: |-
  CRITICAL BUG: Hook scripts extract tool_name from hook_input['data']['tool_name'] but the actual format has tool_name at top-level: hook_input['tool_name'].

  This causes all tool_name values to be empty strings, which breaks TOOL_TO_STRUCTURE mapping, preventing work units from being assigned to structures.

  Fix: Change data.get('tool_name', '') to hook_input.get('tool_name', '') in both scripts.
