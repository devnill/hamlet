notes: |
  # WI-189: Test coverage â€” hook script unit tests
  
  ## Context
  
  The 15 hook scripts in `hooks/` have no unit tests. They are standalone scripts (not part of the package) that read JSON from stdin, change directory to cwd, call `find_server_url()` and `find_config()`, and POST a JSON-RPC payload via `urllib.request.urlopen`. They end with `sys.exit(0)` in a `finally` block.
  
  ## Test structure
  
  Create `tests/test_hooks.py`. Use `importlib.util.spec_from_file_location` to load each hook module by absolute path.
  
  ### Loading hook modules
  
  ```python
  import importlib.util
  import os
  
  HOOKS_DIR = os.path.join(os.path.dirname(__file__), "..", "hooks")
  
  def load_hook(name):
      path = os.path.join(HOOKS_DIR, f"{name}.py")
      spec = importlib.util.spec_from_file_location(name, path)
      mod = importlib.util.module_from_spec(spec)
      spec.loader.exec_module(mod)
      return mod
  ```
  
  Call `load_hook("session_start")` etc. inside each test to get the module fresh.
  
  ### Mocking pattern
  
  Each test should:
  1. `monkeypatch.setattr("sys.stdin", io.StringIO(json.dumps(payload)))`
  2. `monkeypatch.setattr("urllib.request.urlopen", mock_urlopen)`
  3. Patch `hamlet_hook_utils.find_server_url` to return `"http://localhost:8080/hamlet/event"`
  4. Patch `hamlet_hook_utils.find_config` to return `("test-project-id", "Test Project")`
  5. Patch `os.chdir` (the hooks call `os.chdir(cwd)`) to a no-op to avoid test filesystem side effects
  6. Call `pytest.raises(SystemExit)` wrapping `module.main()`
  7. Capture the `Request` object passed to `urlopen.call_args[0][0]`
  8. `body = json.loads(captured_request.data.decode())`
  9. Assert `body["method"] == "hamlet/event"`
  10. Assert `body["params"]["hook_type"] == "ExpectedHookType"`
  
  ### Stdin payloads
  
  Minimum required: `{"session_id": "test-session", "cwd": "/tmp"}`. Per hook, add relevant fields:
  
  - `pre_tool_use`: `{"tool_name": "Read", "tool_input": {"path": "/tmp/x"}}`
  - `post_tool_use`: `{"tool_name": "Write", "success": true}`
  - `notification`: `{"message": "test notification"}`
  - `stop`: `{"stop_reason": "stop"}`
  - `session_start`: `{"source": "test"}`
  - `session_end`: `{"reason": "end"}`
  - `subagent_start`: `{"agent_id": "a1", "agent_type": "coder"}`
  - `subagent_stop`: `{"agent_id": "a1", "agent_type": "coder"}`
  - `teammate_idle`: `{"task_id": "t1", "task_subject": "test", "teammate_name": "alice"}`
  - `task_completed`: `{"task_id": "t1", "task_subject": "test", "task_description": "desc", "teammate_name": "alice"}`
  - `post_tool_use_failure`: `{"tool_name": "Read", "error": "failed", "is_interrupt": false}`
  - `user_prompt_submit`: `{"prompt": "hello"}`
  - `pre_compact`: `{}`
  - `post_compact`: `{}`
  - `stop_failure`: `{"error": {"type": "internal", "reason": "crash"}}`
  
  ### Pre_tool_use timing file
  
  `pre_tool_use.py` may write a timing file to `~/.hamlet/`. Patch `Path.home()` via monkeypatch or use `tmp_path` as the home directory to avoid filesystem side effects.
  
  ### Patching location
  
  The hooks do `sys.path.insert(0, ...)` and `from hamlet_hook_utils import find_server_url, find_config, _log_error`. After `load_hook()`, patch the module's own references: `monkeypatch.setattr(module, "find_server_url", ...)` and `monkeypatch.setattr(module, "find_config", ...)`. Also patch `module.os.chdir` if `os` is imported directly in the hook.
