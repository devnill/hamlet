notes: |
  # WI-131: Add `hamlet init` CLI command
  
  ## Context
  A CLI subcommand (`hamlet init`) that creates `.hamlet/config.json` in the current working directory. This is the terminal-facing counterpart to the plugin's `hamlet_init` MCP tool. Useful for users who want to initialize from the shell rather than from within Claude Code.
  
  ## Existing Code to Reference
  - `src/hamlet/cli/__init__.py` — `main()` with subparser dispatch. Add `init` subparser here.
  - `src/hamlet/cli/commands/install.py` — pattern to follow for a new command module
  - `src/hamlet/cli/commands/__init__.py` — exports commands
  
  ## Files to Create/Modify
  
  ### `src/hamlet/cli/commands/init.py` (create)
  ```python
  """Init command — creates per-project hamlet config."""
  from __future__ import annotations
  import json
  import uuid
  from argparse import Namespace
  from pathlib import Path
  from hamlet.config.settings import Settings
  
  
  def init_command(args: Namespace) -> int:
      cwd = Path.cwd()
      config_dir = cwd / ".hamlet"
      config_path = config_dir / "config.json"
  
      if config_path.exists():
          print(f"Config already exists at {config_path}:")
          print(config_path.read_text())
          print()
          print("Overwrite? (y/N): ", end="", flush=True)
          try:
              response = input().strip().lower()
          except EOFError:
              response = ""
          if response not in ("y", "yes"):
              print("Cancelled.")
              return 0
  
      try:
          settings = Settings.load()
          mcp_port = settings.mcp_port
      except Exception:
          mcp_port = 8080
  
      config_dir.mkdir(exist_ok=True)
      config = {
          "project_id": str(uuid.uuid4()),
          "project_name": cwd.name,
          "server_url": f"http://localhost:{mcp_port}/hamlet/event"
      }
      config_path.write_text(json.dumps(config, indent=2), encoding="utf-8")
      print(f"Created {config_path}:")
      print(json.dumps(config, indent=2))
      return 0
  ```
  
  ### `src/hamlet/cli/__init__.py` (modify)
  Add `init` subparser (alongside `install`, `uninstall`, `daemon`):
  ```python
  init_parser = subparsers.add_parser("init", help="Initialize hamlet for current project")
  init_parser.set_defaults(command="init")
  ```
  
  Add dispatch:
  ```python
  elif parsed_args.command == "init":
      from hamlet.cli.commands.init import init_command
      return init_command(parsed_args)
  ```
  
  ### `src/hamlet/cli/commands/__init__.py` (modify)
  Add `init` to exports.
  
  ## Notes
  - Uses `Settings.load().mcp_port` for the server_url port, falling back to 8080. This means if the user has a custom port configured, the generated config reflects it.
  - Does not write to `~/.hamlet/config.json` — only to `./.hamlet/config.json` in cwd.
  - The overwrite prompt handles non-interactive environments (EOFError → treated as "no").
