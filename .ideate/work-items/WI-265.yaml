notes: |
  # WI-265: Add hamlet settings CLI command

  ## Implementation Notes

  ### New file: src/hamlet/cli/commands/settings_cmd.py

  Create a module with three functions:

  1. `settings_list()` — Load Settings, print all fields as `key = value`. For the `terrain` dict, print each sub-key as `terrain.key = value`.

  2. `settings_get(key)` — Load Settings, look up the field. Support dot notation for terrain sub-keys (`terrain.seed`). Print just the value. Return 1 if key not found.

  3. `settings_set(key, value)` — Load Settings, parse value to the appropriate type (int, float, str, bool, None). For terrain sub-keys, update the terrain dict. Call `_validate()` on the modified Settings. Call `save()`. Print confirmation: `{key}: {old_value} -> {new_value}`.

  Type inference for `settings set`:
  - If the existing value is `int`, parse as int
  - If the existing value is `float`, parse as float
  - If value is `"true"`/`"false"` (case-insensitive), parse as bool
  - If value is `"null"`/`"none"` (case-insensitive), set to None
  - Otherwise keep as string

  Valid top-level keys: all fields of `Settings` dataclass. Use `dataclasses.fields(Settings)` to enumerate them dynamically.

  Error handling:
  - Unknown key → print valid keys, return 1
  - Invalid value type → print expected type, return 1
  - Validation failure → print the ValueError message, return 1

  ### CLI registration (cli/__init__.py)

  Add `settings` subparser with sub-subcommands:
  ```
  hamlet settings              → list all
  hamlet settings get <key>    → get one
  hamlet settings set <key> <value>  → set one
  ```

  Use the deferred import shim pattern consistent with other commands:
  ```python
  def _settings_command(args) -> int:
      from hamlet.cli.commands.settings_cmd import settings_command
      return settings_command(args)
  ```

  ### Key settings to highlight in help text

  The help text should note which settings are most commonly changed:
  - `mcp_port` — daemon HTTP port
  - `min_village_distance` — minimum spacing between village centers
  - `zombie_threshold_seconds` — seconds before idle agents turn zombie
  - `tick_rate` — simulation ticks per second
  - `terrain.*` — terrain generation parameters
