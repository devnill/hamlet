  # WI-193: Code health — enum identity dispatch and convention comment in handle_event

  ## Context

  Q-14 identified that `manager.handle_event()` may use string comparison (`event.hook_type.value == "Notification"`) instead of enum identity (`event.hook_type == HookType.Notification`). The pattern in `inference/engine.py` uses enum identity correctly.

  ## Implementation

  1. Read `src/hamlet/world_state/manager.py` and search for all `hook_type.value ==` or `hook_type.value !=` occurrences within the `handle_event` method.

  2. If any string comparisons exist, replace them with enum identity comparisons.

  3. If the current code already uses enum identity throughout (which the architect's analysis suggests may be the case), confirm this is correct and add a brief comment at the top of `handle_event`:

  ```python
  # All branches use enum identity (event.hook_type == HookType.X), not string comparison.
  # Do not change to hook_type.value == "..." — enum renames would silently fall through.
  ```

  4. Run `pytest tests/test_world_state_manager.py` to confirm no regressions.

  ## Note

  This is a low-effort item. If the code is already correct, the value is purely in adding the convention comment. The comment prevents future contributors from accidentally introducing string comparisons.
