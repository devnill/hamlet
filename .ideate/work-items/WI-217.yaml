criteria:
  - "`Village` dataclass has a `has_expanded: bool = False` field"
  - `WorldStateManager.found_village` sets `has_expanded = True` on the originating village (the village that triggered the expansion, not the new outpost)
  - `ExpansionManager.process_expansion` skips any village where `village.has_expanded is True` before calling `check_village_expansion`
