  async def is_passable(self, x: int, y: int) -> bool: ...
  ```
  
  ## Acceptance Criteria
  
  - `WorldStateManager` has `_terrain_grid` field initialized in `load_from_persistence`
  - `get_terrain_at(x, y)` returns correct `TerrainType`
  - `is_passable(x, y)` returns `True` for FOREST/MEADOW/PLAIN, `False` for WATER/MOUNTAIN
  - `_find_village_position` spiral search finds passable terrain
  - `create_structure` raises `ValueError` when position is on WATER or MOUNTAIN
  - Village centers are at least 15 units apart
  - A test verifies village placement avoids water and mountains
  - A test verifies structure creation fails on impassable terrain
