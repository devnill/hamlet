notes: |
  # WI-188: Test coverage — on_resize, on_mount, and is_plugin_active

  ## Context

  WI-184 added `on_mount` viewport resize call and `on_resize` handler to WorldView. WI-185 added `is_plugin_active()` to install.py. Neither has tests.

  ## test_tui_world_view.py additions

  WorldView widget: `on_mount` calls `self._viewport.resize(self.size.width, self.size.height)`. `on_resize` calls `self._viewport.resize(event.size.width, event.size.height)`.

  For `on_mount` test: construct WorldView with a mock viewport. Set `widget.size` to a mock with `width=80, height=24`. Call `widget.on_mount()`. Assert `mock_viewport.resize.called_with(80, 24)`.

  For `on_resize` test: construct WorldView with a mock viewport. Create `mock_event = MagicMock()` with `mock_event.size.width = 120, mock_event.size.height = 40`. Call `widget.on_resize(mock_event)`. Assert `mock_viewport.resize.called_with(120, 40)`.

  Look at the existing `test_tui_world_view.py` for the pattern used to construct WorldView with a mock ViewportManager. Follow the same fixture pattern.

  ## tests/test_cli_install.py (create)

  Import `is_plugin_active` from `hamlet.cli.commands.install`.

  Use `tmp_path` fixture and monkeypatch `Path.home` to return `tmp_path`.

  Create `tmp_path / ".claude" / "plugins"` directory. Write `installed_plugins.json` with varying content:

  **Wrapped format test**:
  ```json
  {"plugins": {"hamlet-xyz": [{"installPath": "/some/path/hamlet"}]}}
  ```
  Assert `is_plugin_active()` returns `True`.

  **Unwrapped format test**:
  ```json
  {"hamlet-xyz": [{"installPath": "/some/path/hamlet"}]}
  ```
  Assert `is_plugin_active()` returns `True`.

  **Missing file test**: Do not create `installed_plugins.json`. Assert `is_plugin_active()` returns `False`.

  **No matching key test**: Write `{"other-plugin": [{"installPath": "/other"}]}`. Assert `is_plugin_active()` returns `False`.
