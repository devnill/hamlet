notes: |
  # WI-271: Multi-resolution zoom system

  ## Implementation Notes

  ### ZoomLevel enum
  CLOSE=0 (16x16 sprites, NCBLIT_PIXEL), MEDIUM=1 (8x8 sprites, NCBLIT_2x1), FAR=2 (1x1 chars, NCBLIT_1x1)

  ### Cycling
  `next_zoom(current) = (current + 1) % 3`, `prev_zoom(current) = (current - 1) % 3`

  ### Renderer integration
  Add `_zoom` and `set_zoom()` to NotcursesRenderer. In render_frame, check zoom level:
  - FAR: existing character putstr
  - MEDIUM/CLOSE: sprite blit if available, fallback to character

  Fallback is critical — system must work with zero PNGs.

  ### Tests
  Pure unit tests on zoom.py — no notcurses dependency.
