notes: |
  ## WI-304: Village Bounds Expansion

  Villages should grow their bounds as structures are added, creating visual territory.

  ### Approach

  When a structure is created:
  1. Get the village it belongs to
  2. Check if structure position is outside current bounds
  3. If so, expand bounds to include position + margin
  4. Queue write for updated village

  ### Bounds Growth

  ```python
  def expand_bounds_for_structure(village, position, margin=5):
      village.bounds.min_x = min(village.bounds.min_x, position.x - margin)
      village.bounds.max_x = max(village.bounds.max_x, position.x + margin)
      village.bounds.min_y = min(village.bounds.min_y, position.y - margin)
      village.bounds.max_y = max(village.bounds.max_y, position.y + margin)
  ```

  ### Center Updates

  The village center should be the centroid of all structure positions, recalculated when bounds change.
