notes: |
  # WI-120: Validation schema fix and InternalEvent notification/stop fields

  ## Context

  Two related gaps identified in Cycle 004 review:

  1. **Stale validation schema**: `validation.py` EVENT_SCHEMA defines event-specific fields nested under a `"data"` sub-object in params. The actual wire format (all 4 hook scripts + architecture.md canonical contract) is flat — these fields are siblings of `session_id` at the top level of params. Due to `additionalProperties: True`, real events pass validation without error, but no type constraints on individual fields are ever evaluated. The `"data"` block is dead code from a superseded format.

  2. **Missing InternalEvent fields**: `InternalEvent` has no `notification_message` or `stop_reason` typed fields. `event_processor.py` does not extract them. Both values arrive in `raw_payload` only — inaccessible through the typed model.

  ## Fix 1: validation.py EVENT_SCHEMA

  Current state (approximate):
  ```python
  EVENT_SCHEMA = {
      "type": "object",
      "properties": {
          "jsonrpc": ...,
          "method": ...,
          "params": {
              "type": "object",
              "properties": {
                  "session_id": {"type": "string"},
                  "timestamp": {"type": "string"},
                  "hook_type": {"type": "string", "enum": [...]},
                  "project_id": {"type": "string"},
                  "project_name": {"type": "string"},
                  "data": {                              # REMOVE THIS BLOCK
                      "type": "object",
                      "properties": {
                          "tool_name": {"type": "string"},
                          "tool_input": {"type": "object"},
                          "tool_output": {"type": "object"},
                          "success": {"type": "boolean"},
                          "duration_ms": {"type": "integer"},
                          "notification_type": {"type": "string"},
                          "notification_message": {"type": "string"},
                          "stop_reason": {"type": "string"},
                      }
                  }
              },
              "additionalProperties": True,
              ...
          }
      }
  }
  ```

  After fix:
  ```python
  "params": {
      "type": "object",
      "required": ["session_id", "timestamp", "hook_type", "project_id"],
      "properties": {
          "session_id": {"type": "string"},
          "timestamp": {"type": "string"},
          "hook_type": {"type": "string", "enum": ["PreToolUse", "PostToolUse", "Notification", "Stop"]},
          "project_id": {"type": "string"},
          "project_name": {"type": "string"},
          "tool_name": {"type": ["string", "null"]},
          "tool_input": {"type": ["object", "null"]},
          "tool_output": {"type": ["object", "null"]},
          "success": {"type": ["boolean", "null"]},
          "duration_ms": {"type": ["integer", "null"]},
          "notification_type": {"type": ["string", "null"]},
          "notification_message": {"type": ["string", "null"]},
          "stop_reason": {"type": ["string", "null"]},
      },
      "additionalProperties": True
  }
  ```

  Read the actual file before modifying — the current schema may differ slightly from the above approximation. Use what is actually in the file.

  ## Fix 2: InternalEvent — add notification_message and stop_reason fields

  Current `InternalEvent` in `event_processing/internal_event.py` has fields:
  - session_id, project_id, project_name, hook_type
  - tool_name, tool_input, tool_output, success, duration_ms
  - raw_payload, id, sequence, received_at

  Add:
  ```python
  notification_message: str | None = None
  stop_reason: str | None = None
  ```

  Read the actual InternalEvent definition before modifying — use `from __future__ import annotations` if needed for the `str | None` syntax.

  ## Fix 3: event_processor.py — extract new fields in process_event()

  In the method that creates an `InternalEvent` from a raw event dict, add extraction of the two new fields alongside the existing ones:

  ```python
  notification_message=raw.get("notification_message"),
  stop_reason=raw.get("stop_reason"),
  ```

  Read `event_processor.py` to find the exact location of `InternalEvent(...)` construction.

  ## Key files

  - `src/hamlet/mcp_server/validation.py` — EVENT_SCHEMA (read first, then modify)
  - `src/hamlet/event_processing/internal_event.py` — InternalEvent dataclass
  - `src/hamlet/event_processing/event_processor.py` — process_event() / InternalEvent construction
