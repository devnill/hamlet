notes: |
  # WI-146: Consolidate AgentType enum

  ## Context
  Two divergent AgentType enums exist: world_state/types.py has PLANNER, inference/types.py does not. This causes runtime conversion failures in inference/engine.py:218 (`WSAgentType(inferred.value)`) when EXECUTOR agents exist.

  ## Files
  - `src/hamlet/world_state/types.py` — authoritative AgentType (has PLANNER, may be missing EXECUTOR)
  - `src/hamlet/inference/types.py` — has EXECUTOR, missing PLANNER; also defines TYPE_COLORS
  - `src/hamlet/simulation/animation.py` — AGENT_BASE_COLORS dict
  - `src/hamlet/tui/symbols.py` — AGENT_COLORS dict

  ## Changes

  ### src/hamlet/world_state/types.py
  Ensure AgentType contains all members: RESEARCHER, CODER, PLANNER, EXECUTOR, ARCHITECT, TESTER, GENERAL

  ### src/hamlet/inference/types.py
  Remove duplicate AgentType definition. Import from world_state:
  ```python
  from hamlet.world_state.types import AgentType
  ```
  Keep TYPE_COLORS referencing AgentType members.

  ### src/hamlet/simulation/animation.py
  Add any missing AgentType members to AGENT_BASE_COLORS.

  ### src/hamlet/tui/symbols.py
  Add any missing AgentType members to AGENT_COLORS.

  ## Notes
  - Read all 4 files before modifying
  - Check inference/engine.py conversion code after consolidation
  - TYPE_COLORS in inference/types.py should remain (used for color lookup)
