notes: |
  # WI-137: Add `hamlet daemon` to `__main__.py` dispatch
  
  ## Context
  `__main__.py` currently calls `asyncio.run(_run_app())` directly. After the daemon/viewer split and CLI refactor, it should delegate to the CLI parser so `hamlet daemon`, `hamlet init`, `hamlet view` all work via the console_script entry point.
  
  ## Existing Code
  - `src/hamlet/__main__.py` — `main()` calls `asyncio.run(_run_app())`. WI-127 adds `_run_viewer()` here. This work item finalizes the `main()` dispatch.
  
  ## Change to `src/hamlet/__main__.py`
  
  ```python
  def main() -> None:
      import sys
      args = sys.argv[1:]
  
      if not args:
          # No subcommand: launch viewer mode (backward compatible)
          asyncio.run(_run_viewer())
          return
  
      # Delegate to CLI for subcommand dispatch (daemon, init, install, view, etc.)
      from hamlet.cli import main as cli_main
      sys.exit(cli_main(args))
  ```
  
  Remove the old `_run_app()` function (or keep it deprecated with a warning if tests reference it — check test_e2e_*.py before removing).
  
  ## Notes
  - The old `_run_app()` function started everything monolithically (TUI + backend). It should be removed or replaced with `_run_viewer()` since the daemon is now a separate process.
  - E2E tests (`test_e2e_headless.py`, `test_e2e_hook_to_render.py`, `test_e2e_persistence_roundtrip.py`) may instantiate components directly and bypass `_run_app()`. Check before removing.
  - `asyncio.run(_run_viewer())` with no args defaults to `http://localhost:8080` as the daemon URL.
  - The console_script in pyproject.toml (`hamlet = "hamlet.__main__:main"`) continues to work unchanged.
