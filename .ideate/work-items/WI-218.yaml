  # WI-218 Implementation Notes
  
  ## Context
  
  `WorldStateProtocol` at `src/hamlet/protocols.py:23-43` declares 14 methods. Five methods present on `WorldStateManager` are absent from the protocol:
  
  1. `found_village(project_id: str, center: Position, name: str) -> Village` — called by `expansion.py:85`
  2. `create_structure(village_id: str, structure_type: StructureType, position: Position) -> Structure` — called by `expansion.py:118`
  3. `update_structure(structure_id: str, **fields: Any) -> None` — called by `structure_updater.py:42`
  4. `get_agents_in_view(bounds: Any) -> list[Agent]` — called by `app.py:164`, `world_view.py:50`
  5. `get_structures_in_view(bounds: Any) -> list[Structure]` — called by `app.py:169`, `world_view.py:51`
  
  Additionally, `expansion.py` uses `if hasattr(world_state, "found_village"):` guard. Once `found_village` is in the protocol, this guard should be removed and replaced with a direct call.
  
  ## Fix
  
  ### `src/hamlet/protocols.py`
  
  Add the five method stubs to `WorldStateProtocol` (class that inherits from `Protocol`). Read the existing method signatures in `WorldStateManager` to get the exact parameter types and return types.
  
  ### `src/hamlet/tui/remote_world_state.py`
  
  - `get_agents_in_view` — already implemented (line 222). Verify signature matches protocol.
  - `get_structures_in_view` — already implemented (line 231). Verify signature matches protocol.
  - `update_structure` — add no-op stub with `logger.warning(...)` (viewer is read-only)
  - `create_structure` — add no-op stub or `raise NotImplementedError` (viewer does not create structures)
  - `found_village` — add stub that `raise NotImplementedError` (viewer does not found villages)
  
  ### `src/hamlet/simulation/expansion.py`
  
  Remove the `if hasattr(world_state, "found_village"):` guard (lines ~83-88). Replace with a direct call:
  ```python
  outpost_name = f"{village.name} Outpost"
  await world_state.found_village(village.project_id, site, outpost_name)
  ```
  Also remove the `else` branch that emits a warning.
  
  ### Consumer type annotations (optional but recommended)
  
  Modules that typed `world_state: Any` because of missing protocol methods can now be updated to use `WorldStateProtocol`. This is optional for this work item but is the eventual goal.
