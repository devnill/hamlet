notes: |
  # WI-267: Notcurses ctypes binding layer
  
  ## Implementation Notes
  
  ### Source reference
  Port from `~/code/notcurses_test/nc.py` — working ctypes bindings validated on macOS ARM with Ghostty.
  
  ### Library loading
  Load three dylibs at import time via `ctypes.util.find_library()`:
  - `libnotcurses` — contains `notcurses_init`
  - `libnotcurses-core` — most functions (planes, visuals, input)
  - `libnotcurses-ffi` — contains `notcurses_render`, `ncplane_putstr_yx`
  
  If any library fails, set `NOTCURSES_AVAILABLE = False`. Do NOT raise at import time. All wrapper functions raise `RuntimeError("notcurses not available")` when called if libraries are missing.
  
  ### Struct definitions
  Copy from nc.py. Must match notcurses 3.0.x ABI:
  - `NotcursesOptions`, `NcPlaneOptions`, `NcVisualOptions`, `NcInput`
  
  ### Key detail
  `init()` must open `/dev/tty` via libc `fopen(b"/dev/tty", b"w")` so notcurses writes to the real terminal, not stdout.
  
  ### Tests
  Must pass when notcurses is NOT installed. Test `NOTCURSES_AVAILABLE = False` path, struct `_fields_`, function existence. Do NOT call `init()` in tests.
