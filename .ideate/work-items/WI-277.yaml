notes: |
  # WI-277: Kitty sprite system

  ## Context
  Replaces the notcurses sprite system. Key improvement: immutable SpriteHandle with explicit lifecycle fixes cycle 015 Q-12 (invalidation after cleanup).

  ## Design

  ### SpriteHandle (frozen dataclass)
  - `image_id: int` — unique, monotonically increasing
  - `width: int`, `height: int` — pixel dimensions
  - `uploaded: bool` — whether the image has been transmitted to terminal

  ### SpriteManager
  - `_next_id: int` — starts at 1, increments per sprite
  - `_cache: dict[tuple[str, int], SpriteHandle]` — keyed by (filename, size)
  - `_png_data: dict[int, bytes]` — raw PNG bytes keyed by image_id
  - `assets_dir: Path` — defaults to `Path(__file__).parent / "assets"`

  ### Naming conventions
  - Terrain: `terrain_{type}_{size}.png` (e.g., `terrain_forest_16.png`)
  - Structure: `structure_{type}_{stage}_{size}.png` (e.g., `structure_house_3_16.png`)
  - Agent: `agent_{type}_{frame}_{size}.png` (e.g., `agent_coder_0_16.png`)

  ### Q-12 fix (SpriteSheet invalidation)
  - SpriteHandle is frozen — never mutated
  - Image IDs are monotonically increasing — never reused
  - `cleanup()` sends bulk delete to terminal, clears cache, but doesn't touch existing SpriteHandle objects
  - After cleanup, display commands for deleted IDs are silently ignored by terminal

  ### Size snapping
  Supported: 16, 8. Snap to largest <= requested. If < 8, use 8.
