  # WI-221 Implementation Notes

  ## Context

  EVENT_SCHEMA in `src/hamlet/mcp_server/validation.py` already allows `["object", "string", "null"]`
  for tool_output per the decomposer's analysis. InternalEvent.tool_output is already typed as
  `dict[str, Any] | str | None`. The fix is in place — this work item adds regression tests.

  ## Work

  ### tests/test_mcp_validation.py

  Add three test cases:
  1. Payload with `tool_output: "command output string"` — assert validation passes
  2. Payload with `tool_output: {"stdout": "..."}` — assert validation passes
  3. Payload with `tool_output: null` — assert validation passes

  Use the existing pattern for constructing valid payloads (find an existing test that builds a
  full payload dict with jsonrpc, method, params).

  ### tests/test_event_processor.py

  Add a test that calls `process_event` with a raw dict containing `tool_output: "bash output"`
  and asserts the returned InternalEvent has `event.tool_output == "bash output"`.

  ## Files

  - `src/hamlet/mcp_server/validation.py` — verify schema; fix if not already accepting strings
  - `src/hamlet/event_processing/event_processor.py` — verify passthrough; fix if needed
  - `tests/test_mcp_validation.py` — add three tool_output tests
  - `tests/test_event_processor.py` — add string tool_output passthrough test
