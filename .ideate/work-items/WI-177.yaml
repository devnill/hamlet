notes: |
  # WI-177 Notes: Add server_url parameter to hamlet_init
  
  ## Context
  Users running hamlet on a non-default port must currently edit `.hamlet/config.json` manually after running hamlet_init. Adding an optional `server_url` parameter allows setting it at init time.
  
  ## File to modify
  `/Users/dan/code/hamlet/mcp/server.py`
  
  ## Current inputSchema (line 33-38)
  ```python
  inputSchema={
      "type": "object",
      "properties": {
          "path": {
              "type": "string",
              "description": "Project root directory. Defaults to current working directory."
          }
      },
      "required": []
  }
  ```
  
  ## Desired inputSchema
  ```python
  inputSchema={
      "type": "object",
      "properties": {
          "path": {
              "type": "string",
              "description": "Project root directory. Defaults to current working directory."
          },
          "server_url": {
              "type": "string",
              "description": "URL of the hamlet daemon event endpoint. Defaults to http://localhost:8080/hamlet/event."
          }
      },
      "required": []
  }
  ```
  
  ## Current tool description (line 23-28)
  ```python
  description=(
      "Initialize hamlet for the current project. Creates .hamlet/config.json "
      "with a unique project_id, project_name, and server_url. "
      "Optionally accepts a path argument to specify the project root "
      "(defaults to current working directory). "
      "Run this once per project before using hamlet."
  ),
  ```
  
  ## Desired tool description
  Add mention of server_url parameter:
  ```python
  description=(
      "Initialize hamlet for the current project. Creates .hamlet/config.json "
      "with a unique project_id, project_name, and server_url. "
      "Optionally accepts a path argument to specify the project root "
      "(defaults to current working directory) and a server_url argument "
      "to set a custom daemon endpoint (defaults to http://localhost:8080/hamlet/event). "
      "Run this once per project before using hamlet."
  ),
  ```
  
  ## Config write change (line 49-53)
  ```python
  # Current
  config = {
      "project_id": str(uuid.uuid4()),
      "project_name": project_root.name,
      "server_url": "http://localhost:8080/hamlet/event"
  }
  
  # Desired
  default_server_url = "http://localhost:8080/hamlet/event"
  config = {
      "project_id": str(uuid.uuid4()),
      "project_name": project_root.name,
      "server_url": arguments.get("server_url") or default_server_url
  }
  ```
  
  The `arguments or {}` guard is already in place at line 48, so `arguments.get("server_url")` is safe.
