  # WI-174 Notes: Extract hook utilities to hamlet_hook_utils.py
  
  ## Context
  All four hook scripts contain identical copies of `_cwd_hash`, `find_server_url`, `find_config`, and `_log_error`. Extracting these to a shared module eliminates ~200 lines of duplicated code.
  
  ## File to create
  `/Users/dan/code/hamlet/hooks/hamlet_hook_utils.py`
  
  Content: copy the four shared functions verbatim from pre_tool_use.py. No changes to logic.
  
  ```python
  #!/usr/bin/env python3
  """Shared utilities for Hamlet hook scripts."""
  import hashlib
  import json
  import os
  import traceback
  from datetime import datetime, timezone
  from pathlib import Path
  
  
  def _cwd_hash(cwd: Path) -> str:
      return hashlib.sha256(str(cwd).encode()).hexdigest()[:16]
  
  
  def find_server_url() -> str:
      """Read server_url: check project config first, then global, then default."""
      default = "http://localhost:8080/hamlet/event"
      cwd = Path(os.getcwd())
      for directory in [cwd, *cwd.parents]:
          config_path = directory / ".hamlet" / "config.json"
          if config_path.exists():
              try:
                  cfg = json.loads(config_path.read_text())
                  url = cfg.get("server_url", "")
                  if url:
                      return url
              except Exception:
                  pass
      try:
          config_path = Path.home() / ".hamlet" / "config.json"
          if config_path.exists():
              data = json.loads(config_path.read_text())
              url = data.get("server_url", "")
              return url if url else default
      except Exception:
          pass
      return default
  
  
  def find_config() -> tuple[str, str]:
      """Traverse from cwd up to root looking for .hamlet/config.json with project_id."""
      cwd = Path(os.getcwd())
      for directory in [cwd, *cwd.parents]:
          config_path = directory / ".hamlet" / "config.json"
          if config_path.exists():
              try:
                  cfg = json.loads(config_path.read_text())
                  pid = cfg.get("project_id", "")
                  if pid:
                      return pid, cfg.get("project_name", directory.name)
              except Exception:
                  pass
      return f"project-{_cwd_hash(cwd)}", cwd.name
  
  
  def _log_error(hook_name: str, exc: Exception) -> None:
      """Log hook errors to file for debugging."""
      try:
          log_dir = Path.home() / ".hamlet"
          log_dir.mkdir(parents=True, exist_ok=True)
          log_file = log_dir / "hooks.log"
          timestamp = datetime.now(timezone.utc).isoformat()
          with open(log_file, "a") as f:
              f.write(f"[{timestamp}] {hook_name}: {exc}\n{traceback.format_exc()}\n")
      except Exception:
          pass
  ```
  
  Note: `import os` is moved to module level (removing the deferred `import os` inside function bodies — minor improvement already noted in prior review M3).
  
  ## Files to modify
  
  Each hook script needs:
  1. Add `sys.path.insert(0, str(Path(__file__).parent))` before the hamlet_hook_utils import — this ensures the hooks/ directory is on sys.path regardless of how the script is invoked
  2. Add `from hamlet_hook_utils import find_server_url, find_config, _log_error`
  3. Remove the local `_cwd_hash`, `find_server_url`, `find_config`, `_log_error` function definitions
  4. Remove `import hashlib` (no longer needed in hook scripts)
  5. Remove `import traceback` (no longer needed in hook scripts)
  6. Remove the `import os` inside function bodies (moved to hamlet_hook_utils)
  
  For `pre_tool_use.py` and `post_tool_use.py`: also remove `from datetime import datetime, timezone` only if it's no longer used for anything other than the payload timestamp — actually, `datetime` IS still used in `main()` for the timestamp field, so keep it.
  
  Check each file:
  - `pre_tool_use.py`: keeps `import time`, `record_start_time`, `TIMING_DIR`, `datetime`
  - `post_tool_use.py`: keeps `import time`, `compute_duration`, `TIMING_DIR`, `datetime`
  - `notification.py`: keeps `datetime`
  - `stop.py`: keeps `datetime`
  
  The sys.path.insert pattern:
  ```python
  import sys
  from pathlib import Path
  sys.path.insert(0, str(Path(__file__).parent))
  from hamlet_hook_utils import find_server_url, find_config, _log_error
  ```
  
  `Path` is already imported in all four scripts, so no new import needed for the path expression.
  `sys` is already imported in all four scripts.
