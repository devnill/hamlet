  # WI-162: Move TOOL_TO_STRUCTURE map to world_state/rules.py
  
  ## Context
  WI-108 consolidated STRUCTURE_RULES to world_state/rules.py as the single source of truth. However, TOOL_TO_STRUCTURE (mapping tool names to StructureType) remained as a local dict in inference/engine.py:28-35. Both code-quality and spec-adherence reviewers independently flagged this as an incomplete consolidation.
  
  ## Changes
  
  ### src/hamlet/world_state/rules.py
  Add TOOL_TO_STRUCTURE dict (copy from engine.py, using the same StructureType values):
  ```python
  TOOL_TO_STRUCTURE: dict[str, StructureType] = {
      "Read": StructureType.LIBRARY,
      "Grep": StructureType.LIBRARY,
      "Glob": StructureType.LIBRARY,
      "Write": StructureType.WORKSHOP,
      "Edit": StructureType.WORKSHOP,
      "Bash": StructureType.FORGE,
  }
  ```
  
  Add to `__all__` alongside `STRUCTURE_RULES`.
  
  ### src/hamlet/inference/engine.py
  Remove the local TOOL_TO_STRUCTURE dict (lines ~28-35).
  Add import:
  ```python
  from hamlet.world_state.rules import TOOL_TO_STRUCTURE
  ```
  
  ## Notes
  - Read rules.py and engine.py before modifying
  - Verify the exact keys in the current TOOL_TO_STRUCTURE in engine.py — the dict above is the expected content but confirm
  - Verify that only engine.py uses TOOL_TO_STRUCTURE (not other files that might need the import updated)
