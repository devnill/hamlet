notes: |
  # Implementation Notes: 091 - Hook Scripts - Notification and Stop

  ## Scope

  Complete the hook script suite with Notification and Stop handlers.

  ## Implementation

  ### notification.py

  Similar structure to pre_tool_use.py but:
  - `hook_type`: "Notification"
  - Extracts `notification_type` and `message` from env
  - Used for non-tool events (errors, completions, etc.)

  ### stop.py

  - `hook_type`: "Stop"
  - Signals session end
  - Allows server to mark agents idle/zombie faster

  ## Shared Code

  Consider extracting common function to reduce duplication:

  ```python
  def send_event(hook_type: str, extra_fields: dict = None) -> None:
      """Send event to Hamlet server. Never raises."""
      try:
          payload = {
              "jsonrpc": "2.0",
              "method": "hamlet/event",
              "params": {
                  "hook_type": hook_type,
                  "session_id": os.environ.get("CLAUDE_SESSION_ID", "unknown"),
                  "project_id": os.environ.get("CLAUDE_PROJECT_ID", "unknown"),
                  **(extra_fields or {})
              }
          }
          # ... send logic
      except Exception:
          pass
  ```

  But since scripts must be single-file and dependency-free, duplication is acceptable.

  ## Testing

  ```bash
  # Test notification
  $ CLAUDE_SESSION_ID=test python hooks/notification.py

  # Test stop
  $ CLAUDE_SESSION_ID=test python hooks/stop.py
  ```

  ## Acceptance Criteria Checklist

  - [ ] All 4 hook scripts exist (pre, post, notification, stop)
  - [ ] All scripts follow same error handling pattern
  - [ ] All scripts are executable
