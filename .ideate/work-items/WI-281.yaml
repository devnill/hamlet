notes: |
  # WI-281: Kitty viewer app, state fetching, and legend overlay
  
  ## Context
  Main viewer application. Fixes Q-11 (terrain endpoint) and Q-15 (legend overlay).
  
  ## State fetching (simplified)
  No subprocess isolation needed. Use `urllib.request` directly:
  - `/hamlet/health` — health check before taking terminal
  - `/hamlet/state` — agents, structures, villages
  - `/hamlet/events` — event log entries
  - `/hamlet/terrain/bounds/{min_x}/{min_y}/{max_x}/{max_y}` — **fixes Q-11**
  
  ## Terminal management
  - Enter: `\x1b[?1049h` (alt screen), `\x1b[?25l` (hide cursor)
  - Exit: `\x1b[?25h` (show cursor), `\x1b[?1049l` (leave alt screen)
  - Raw mode via `tty.setraw()`, restore via `termios.tcsetattr()`
  
  ## Input handling
  Non-blocking stdin read via `select.select([sys.stdin], [], [], 0)`.
  Arrow keys arrive as `\x1b[A/B/C/D` — read 3 bytes when first is `\x1b`.
  
  Keys: q=quit, hjkl/arrows=pan, f=follow, +/-=zoom, /=legend
  
  ## Legend overlay (Q-15 fix)
  Centered bordered box (~40x20) showing:
  - Key bindings
  - Agent symbol (@)
  - Structure symbols from SymbolConfig
  - Terrain symbols from SymbolConfig
  
  Rendered after main frame, overwriting center area.
  
  ## Render loop
  30 FPS, state fetch every ~1 second. Frame: fetch if needed → render → process input → sleep remainder.
