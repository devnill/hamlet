  # WI-258: Fix Water Bias Formula Documentation
  
  ## Objective
  Correct the documentation for the water bias formula in biome region generation.
  
  ## Finding Addressed
  S1: Water bias formula documentation inaccurate. Comment says "Max +/-0.3 adjustment" but formula produces max +/-0.15.
  
  ## File Scope
  - `src/hamlet/world_state/terrain.py` — line 651
  
  ## Implementation Notes
  The water bias formula is:
  ```python
  bias_strength = self._config.region_blending * 0.3
  bias[TerrainType.WATER] = bias_strength * (-biome_char) * 0.5
  ```
  
  With `region_blending` in [0, 1] and `biome_char` in [-1, 1]:
  - Maximum `bias_strength` = 0.3
  - Maximum `bias[TerrainType.WATER]` = 0.3 * 1.0 * 0.5 = 0.15
  
  Options:
  1. Update comment to reflect actual maximum (0.15)
  2. Adjust multipliers to achieve documented maximum (0.3)
  
  Recommended: Option 1 — the formula is correct, documentation is wrong.
  
  ## Acceptance Criteria
  - Comment correctly reflects actual maximum bias (+/-0.15)
