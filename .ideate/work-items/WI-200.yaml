notes: |
  # WI-200: notification_type downstream consumption in WorldStateManager
  
  ## Context
  
  WI-196 added `notification_type: str | None` to `InternalEvent` and maps it from the hook payload's `"type"` field (defaulting to `"generic"`). No downstream component reads this field. Q-16 asked about using `notification_type` for routing.
  
  ## Changes Required
  
  ### manager.py — handle_event HookType.Notification branch
  
  Currently the Notification branch builds a static summary string. Update it to vary the summary based on `event.notification_type`.
  
  Locate the `HookType.Notification` branch in `handle_event`. The current code likely does something like:
  ```python
  elif event.hook_type == HookType.Notification:
      summary = f"Notification: {event.message or ''}"
  ```
  
  Change to:
  ```python
  elif event.hook_type == HookType.Notification:
      ntype = event.notification_type or "generic"
      if ntype != "generic":
          summary = f"Notification [{ntype}]: {event.message or ''}"
      else:
          summary = f"Notification: {event.message or ''}"
  ```
  
  This satisfies Q-16's routing intent at minimum viable scope: different event-log summary strings per notification type. Defer full visual differentiation (animations, colors) to a dedicated visual-effects cycle.
  
  ## Constraints
  
  - Do NOT introduce new world-state mutations or lock acquisition patterns — this branch is currently a pass-through with no side effects beyond event-log append.
  - Do NOT add `@pytest.mark.asyncio` decorators to any tests.
  - The test for this behavior can be added to `tests/test_world_state_manager.py` or a new test — follow existing patterns in the file.
