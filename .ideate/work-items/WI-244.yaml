notes: |
  # WI-244: Mountain Ridge Generation

  ## Context

  Mountains from noise can form scattered peaks. Ridge generation creates connected mountain chains using midpoint displacement.

  ## Implementation Notes

  ### Location
  - `src/hamlet/world_state/terrain.py` — add `generate_ridge_chain()` method

  ### Midpoint Displacement Algorithm

  ```python
  def generate_ridge_chain(
      self,
      start: Position,
      end: Position,
      roughness: float = 0.5
  ) -> list[Position]:
      """Generate a ridge chain from start to end using midpoint displacement."""
      points = [start, end]

      # Iterate until segments are small enough
      while True:
          new_points = []
          for i in range(len(points) - 1):
              p1, p2 = points[i], points[i + 1]

              # Midpoint
              mid_x = (p1.x + p2.x) // 2
              mid_y = (p1.y + p2.y) // 2

              # Perpendicular displacement (along ridge)
              # Use seeded random for determinism
              self._random.seed(self._seed + hash((p1, p2)))
              displacement = self._random.uniform(-roughness, roughness) * abs(p2.x - p1.x + p2.y - p1.y)

              # Apply displacement perpendicular to line
              dx, dy = p2.x - p1.x, p2.y - p1.y
              length = (dx * dx + dy * dy) ** 0.5
              if length == 0:
                  continue

              # Perpendicular direction
              perp_x, perp_y = -dy / length, dx / length
              mid_x += int(perp_x * displacement)
              mid_y += int(perp_y * displacement)

              new_points.append(Position(mid_x, mid_y))

          if not new_points:
              break

          # Insert new points
          for j, p in enumerate(new_points):
              points.insert(2 * j + 1, p)

          # Stop when segments are unit length
          if all(abs(points[i].x - points[i + 1].x) + abs(points[i].y - points[i + 1].y) <= 1
                 for i in range(len(points) - 1)):
              break

      return points
  ```

  ### Ridge Seeding

  After initial terrain generation, identify high-elevation points as ridge seeds:

  ```python
  def _generate_ridge_seeds(self, heightmap: dict[Position, float]) -> list[tuple[Position, Position]]:
      """Find pairs of high points to connect with ridges."""
      # Sample high-elevation points
      peaks = [pos for pos, h in heightmap.items() if h > self._config.mountain_threshold * 0.8]

      # Select N pairs to connect (where N = world_size / 50 roughly)
      num_ridges = max(1, self._config.world_size // 50)
      self._random.seed(self._seed + 9999)
      pairs = []
      for _ in range(num_ridges):
          if len(peaks) >= 2:
              p1, p2 = self._random.sample(peaks, 2)
              pairs.append((p1, p2))
      return pairs
  ```

  ### Integration

  After fBm terrain classification, generate ridges:

  ```python
  # In main generation pipeline:
  ridges = []
  for start, end in self._generate_ridge_seeds(heightmap):
      ridge = self.generate_ridge_chain(start, end)
      for pos in ridge:
          terrain[pos] = TerrainType.MOUNTAIN
  ```

  ### Tests

  - Test that ridge chain connects start and end points
  - Test that same seed produces same ridge
  - Test that roughness affects ridge variability
  - Verify visually that ridges appear as connected chains
