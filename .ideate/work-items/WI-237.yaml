  # WI-237: WorldView terrain layer rendering
  
  ## Summary
  Modify `WorldView.render()` to render terrain as a background layer beneath structures and agents.
  
  ## Implementation
  
  ### src/hamlet/tui/world_view.py
  
  Modify imports:
  
  ```python
  from hamlet.tui.symbols import (
      AGENT_SYMBOL, get_agent_color, get_structure_symbol, get_structure_color,
      get_terrain_symbol, get_terrain_color,  # NEW
  )
  from hamlet.world_state.terrain import TerrainType  # NEW
  ```
  
  Add terrain_grid parameter to `__init__`:
  
  ```python
  class WorldView(Static):
      def __init__(
          self,
          world_state: Any,
          viewport: Any,
          terrain_grid: Any,  # TerrainGrid protocol
      ) -> None:
          super().__init__()
          self._world_state = world_state
          self._viewport = viewport
          self._terrain_grid = terrain_grid  # NEW
          self._agents: list[Any] = []
          self._structures: list[Any] = []
          self._spin_frame: int = 0
  ```
  
  Modify `render()` to include terrain layer:
  
  ```python
  def render(self) -> Text:
      # ... existing viewport setup ...
  
      bounds = self._viewport.get_visible_bounds()
  
      # Get terrain for visible bounds
      from hamlet.world_state.types import Position
      terrain_map: dict[tuple[int, int], TerrainType] = {}
      for y in range(bounds.min_y, bounds.max_y + 1):
          for x in range(bounds.min_x, bounds.max_x + 1):
              pos = Position(x, y)
              terrain_map[(x, y)] = self._terrain_grid.get_terrain(pos)
  
      # Build position lookups (existing code)
      agent_by_pos: dict[tuple[int, int], Any] = {}
      for agent in self._agents:
          pos = agent.position
          agent_by_pos[(pos.x, pos.y)] = agent
  
      struct_by_pos: dict[tuple[int, int], tuple[str, str]] = {}
      # ... existing structure footprint logic ...
  
      text = Text()
      for y in range(bounds.min_y, bounds.max_y + 1):
          for x in range(bounds.min_x, bounds.max_x + 1):
              key = (x, y)
              if key in agent_by_pos:
                  agent = agent_by_pos[key]
                  color = get_agent_color(agent)
                  if agent.state == AgentState.ACTIVE:
                      symbol = SPIN_SYMBOLS[self._spin_frame]
                  else:
                      symbol = AGENT_SYMBOL
                  text.append(symbol, style=color)
              elif key in struct_by_pos:
                  char, style = struct_by_pos[key]
                  text.append(char, style=style)
              else:
                  # Terrain background layer
                  terrain = terrain_map.get(key, TerrainType.PLAIN)
                  text.append(terrain.symbol, style=terrain.color)
          text.append("\n")
      return text
  ```
  
  ### src/hamlet/tui/app.py
  
  Modify `WorldView` instantiation to pass terrain_grid:
  
  ```python
  # In HamletApp.__init__ or mount:
  self._world_view = WorldView(self._world_state, self._viewport, self._terrain_grid)
  ```
  
  ## Acceptance Criteria
  
  - WorldView renders terrain symbols as background when no agent or structure is present
  - Water renders as `~` in blue
  - Mountain renders as `^` in grey85
  - Forest renders as `♣` in green
  - Meadow renders as `"` in chartreuse
  - Plain renders as `.` in white
  - Agents render on top of terrain
  - Structures render on top of terrain
  - Multi-cell structure borders (`+`, `-`, `|`) render on top of terrain
  - A test verifies terrain layer is rendered for empty cells
  - A test verifies agent takes priority over terrain
  - A test verifies structure takes priority over terrain
