  # WI-232: TerrainType enum and TerrainConfig dataclass
  
  ## Summary
  Define the `TerrainType` enum with terrain properties and `TerrainConfig` dataclass for generation configuration.
  
  ## Implementation
  
  ### src/hamlet/world_state/terrain.py (NEW FILE)
  
  ```python
  from dataclasses import dataclass
  from enum import Enum
  
  class TerrainType(Enum):
      """Terrain types with inherent properties."""
      WATER = "water"
      MOUNTAIN = "mountain"
      FOREST = "forest"
      MEADOW = "meadow"
      PLAIN = "plain"
  
      @property
      def passable(self) -> bool:
          """True if agents/structures can occupy this terrain."""
          return self in (TerrainType.FOREST, TerrainType.MEADOW, TerrainType.PLAIN)
  
      @property
      def symbol(self) -> str:
          """ASCII symbol for TUI rendering."""
          symbols = {
              TerrainType.WATER: "~",
              TerrainType.MOUNTAIN: "^",
              TerrainType.FOREST: "♣",
              TerrainType.MEADOW: '"',
              TerrainType.PLAIN: ".",
          }
          return symbols[self]
  
      @property
      def color(self) -> str:
          """Rich color name for TUI rendering."""
          colors = {
              TerrainType.WATER: "blue",
              TerrainType.MOUNTAIN: "grey85",
              TerrainType.FOREST: "green",
              TerrainType.MEADOW: "chartreuse",
              TerrainType.PLAIN: "white",
          }
          return colors[self]
  
  
  @dataclass
  class TerrainConfig:
      """Configuration for terrain generation."""
      seed: int | None = None  # None = generate random seed
      world_size: int = 200  # world is [-100, 100] x [-100, 100]
      water_frequency: float = 0.02
      mountain_frequency: float = 0.015
      forest_threshold: float = 0.4
      meadow_threshold: float = 0.6
      water_threshold: float = -0.3
      mountain_threshold: float = 0.7
  ```
  
  ### src/hamlet/world_state/__init__.py
  
  Add exports:
  ```python
  from .terrain import TerrainType, TerrainConfig
  ```
  
  ## Acceptance Criteria
  
  - `TerrainType` enum has exactly 5 members: WATER, MOUNTAIN, FOREST, MEADOW, PLAIN
  - `TerrainType.passable` returns `True` for FOREST, MEADOW, PLAIN; `False` for WATER, MOUNTAIN
  - `TerrainType.symbol` returns correct ASCII character for each type
  - `TerrainType.color` returns valid Rich color name for each type
  - `TerrainConfig` dataclass has all fields with correct types and default values
  - A test verifies `TerrainType.WATER.passable == False`
  - A test verifies `TerrainType.FOREST.passable == True`
