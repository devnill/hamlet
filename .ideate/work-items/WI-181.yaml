  # WI-181 Notes: Update hooks.json — 15 hooks, fix PreToolUse async
  
  ## Context
  Two changes: (1) remove async:true from PreToolUse (it's a blocking event — async unsupported, likely causing "1 error during load"), (2) register all 11 new hook types.
  
  ## Async rules per Claude Code docs
  - async: true NOT supported on: PreToolUse, PermissionRequest, PreCompact
  - async: true supported on all other hook types
  
  ## 15 hooks and their async setting
  PreToolUse: NO async
  PostToolUse: async true
  Notification: async true
  Stop: async true
  SessionStart: async true
  SessionEnd: async true
  SubagentStart: async true
  SubagentStop: async true
  TeammateIdle: async true
  TaskCompleted: async true
  PostToolUseFailure: async true
  UserPromptSubmit: async true
  PreCompact: NO async
  PostCompact: async true
  StopFailure: async true
