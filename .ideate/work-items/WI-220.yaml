  # WI-220 Implementation Notes

  ## Context

  The handle_event method in `src/hamlet/world_state/manager.py` dispatches on `event.hook_type`
  using enum identity comparisons (`event.hook_type == HookType.X`). A comment explicitly warns
  against string comparison. The code is already correct per the decomposer's analysis.

  ## Work

  1. Confirm no `.value == "` string comparison patterns exist in handle_event.
  2. Add a parametrized regression test covering all 15 HookType values.

  ## Test structure

  ```python
  @pytest.mark.parametrize("hook_type", list(HookType))
  async def test_handle_event_all_hook_types(hook_type, world_state_manager):
      event = make_internal_event(hook_type=hook_type)
      await world_state_manager.handle_event(event)
      # No assertion beyond "did not raise"
  ```

  Use a helper `make_internal_event` (or reuse existing fixture) that constructs a minimal valid
  InternalEvent with the given hook_type. Required fields: id (uuid), sequence (1), received_at
  (now), session_id, project_id, project_name, hook_type.

  ## Files

  - `src/hamlet/world_state/manager.py` — verify; fix string comparison if found
  - `tests/test_world_state_manager.py` — add parametrized test
