notes: |
  # WI-201: Test WorldStateManager.handle_event Stop/end_turn IDLE transition

  ## Context

  WI-199 added "end_turn" to the stop_reason IDLE transition guard in both `AgentInferenceEngine._handle_stop` and `WorldStateManager.handle_event`. The engine-side path is covered by `test_stop_end_turn_reason_marks_idle` in `tests/test_inference_engine.py`. The manager-side path at `manager.py:883` has no test.

  ## Changes Required

  ### tests/test_world_state_manager.py

  Add a test alongside the existing `test_handle_event_session_end_sets_agents_idle`. The test should:

  1. Create a manager with mock persistence
  2. Create an agent in a session (via `get_or_create_project`, `get_or_create_session`, `get_or_create_agent`)
  3. Build a Stop InternalEvent with `stop_reason="end_turn"` for that session
  4. Call `await manager.handle_event(event)`
  5. Assert the agent's state is `AgentState.IDLE` (via `get_all_agents()`)

  No `@pytest.mark.asyncio` decorator — asyncio_mode=auto is set in pyproject.toml.

  Look at `test_handle_event_session_end_sets_agents_idle` (around line 400 in the file) for the pattern — it creates agents and checks their state after a SessionEnd event. The same setup pattern applies here.

  The Stop InternalEvent should look like:
  ```python
  event = InternalEvent(
      id="evt-stop-end-turn",
      sequence=1,
      received_at=datetime.now(UTC),
      session_id=session_id,
      project_id=project_id,
      project_name="P1",
      hook_type=HookType.Stop,
      stop_reason="end_turn",
  )
  ```
