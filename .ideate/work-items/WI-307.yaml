notes: |-
  Two changes:

  1. In `hooks/hamlet_hook_utils.py`, add `HOOK_VERSION = "0.7.2"` near the top. This gets published with the hooks and serves as a version tag for staleness detection.

  2. In `src/hamlet/cli/commands/doctor.py`, add a hook staleness check inside the `--check-hooks` branch. The check should:
     - Find the installed hooks directory by checking known plugin cache paths (`~/.claude/plugins/cache/marketplace/hamlet/*/hooks/`) and/or the hooks registered in Claude Code settings
     - Import or read `HOOK_VERSION` from the installed `hamlet_hook_utils.py`
     - Compare against `hamlet.__version__`
     - Print PASS if matching, FAIL with instructions if stale

  Keep the detection best-effort — if the installed hooks can't be found, print a warning rather than failing.

  Note: HOOK_VERSION must be updated alongside __init__.py on version bumps. The test from WI-306 only covers plugin.json; consider whether to extend it or add a separate assertion. Use judgment — if it's a one-liner addition to the existing test, do it there.
