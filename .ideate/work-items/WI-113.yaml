notes: |
  # WI-113: Hook script rewrite — read stdin, find_config, send all required fields

  ## Context

  All four hook scripts (hooks/pre_tool_use.py, hooks/post_tool_use.py, hooks/notification.py, hooks/stop.py) are broken in the same way:

  1. **Never read stdin.** Claude Code delivers all hook data as JSON on stdin. The hooks ignore stdin entirely and attempt to read `CLAUDE_TOOL_NAME`, `CLAUDE_PROJECT_ID`, `CLAUDE_SESSION_ID`, `CLAUDE_AGENT_NAME`, etc. from environment variables. None of these are Claude Code variables. They are always empty/default. Result: every event arrives with `tool_name=None`, `project_id="unknown"`, agent type inference always returns GENERAL.

  2. **Use fabricated environment variables for project identity.** `CLAUDE_PROJECT_ID` does not exist as a Claude Code variable. The architecture specifies using a `find_config()` function that traverses parent directories for `.hamlet/config.json`.

  3. **Missing required fields.** PostToolUse never sends `duration_ms`. All hooks omit `project_name`. Without `duration_ms`, every tool call contributes exactly 1 work unit regardless of duration.

  4. **Error log overwrites.** `log_file.write_text(...)` truncates the log on each error. Should append.

  ## Claude Code Hook Input Schema

  Claude Code delivers hook input as JSON on stdin. The structure is:

  ```json
  // PreToolUse
  {
    "session_id": "uuid",
    "transcript_path": "/path/to/transcript.json",
    "hook_event_name": "PreToolUse",
    "tool_name": "Read",
    "tool_input": {"file_path": "/some/file.py"}
  }

  // PostToolUse
  {
    "session_id": "uuid",
    "transcript_path": "/path/to/transcript.json",
    "hook_event_name": "PostToolUse",
    "tool_name": "Read",
    "tool_input": {"file_path": "/some/file.py"},
    "tool_response": {
      "type": "tool_result",
      "content": "...",
      "is_error": false
    }
  }

  // Notification
  {
    "session_id": "uuid",
    "transcript_path": "/path/to/transcript.json",
    "hook_event_name": "Notification",
    "message": "Notification text"
  }

  // Stop
  {
    "session_id": "uuid",
    "transcript_path": "/path/to/transcript.json",
    "hook_event_name": "Stop",
    "stop_hook_active": false
  }
  ```

  Note: `duration_ms` is not in the PostToolUse stdin input. Compute elapsed time using a temp file written at PreToolUse time and read at PostToolUse time.

  ## Implementation Notes

  ### find_config() — required for all hooks

  ```python
  import hashlib
  import json
  from pathlib import Path

  def find_config():
      """Traverse from cwd up to root looking for .hamlet/config.json."""
      current = Path.cwd()
      for parent in [current, *current.parents]:
          config_path = parent / ".hamlet" / "config.json"
          if config_path.exists():
              try:
                  data = json.loads(config_path.read_text())
                  return data.get("project_id", _cwd_hash()), data.get("project_name", parent.name)
              except Exception:
                  pass
      return _cwd_hash(), Path.cwd().name

  def _cwd_hash():
      return hashlib.sha256(str(Path.cwd()).encode()).hexdigest()[:16]
  ```

  ### duration_ms computation for PostToolUse

  At PreToolUse: write a temp file with the current timestamp.
  At PostToolUse: read the temp file, compute elapsed ms, delete the file.

  ```python
  import time
  from pathlib import Path

  TIMING_DIR = Path.home() / ".hamlet" / "timing"

  # In pre_tool_use.py:
  def record_start_time(session_id, tool_name):
      TIMING_DIR.mkdir(parents=True, exist_ok=True)
      key = f"{session_id}_{tool_name}"
      (TIMING_DIR / key).write_text(str(time.time()))

  # In post_tool_use.py:
  def compute_duration(session_id, tool_name):
      key = f"{session_id}_{tool_name}"
      timing_file = TIMING_DIR / key
      if timing_file.exists():
          try:
              start = float(timing_file.read_text())
              timing_file.unlink()
              return int((time.time() - start) * 1000)
          except Exception:
              pass
      return None
  ```

  ### success field for PostToolUse

  From `hook_input["tool_response"]`: success is `not hook_input["tool_response"].get("is_error", False)`.

  ### Error log (all hooks)

  Replace:
  ```python
  log_file.write_text(f"Error: {e}\n")
  ```
  With:
  ```python
  with open(log_file, "a") as f:
      f.write(f"Error: {e}\n")
  ```

  ### HTTP payload structure

  Keep the existing flat structure (params fields at top level, not nested under `data`). This is the implemented contract and architecture.md will be updated to match.

  ```python
  params = {
      "session_id": hook_input.get("session_id", "unknown"),
      "timestamp": datetime.utcnow().isoformat() + "Z",
      "hook_type": "PreToolUse",  # or PostToolUse, Notification, Stop
      "project_id": project_id,
      "project_name": project_name,
      "tool_name": hook_input.get("tool_name"),      # PreToolUse, PostToolUse
      "tool_input": hook_input.get("tool_input"),    # PreToolUse, PostToolUse
      # PostToolUse only:
      "tool_output": hook_input.get("tool_response"),
      "success": not hook_input.get("tool_response", {}).get("is_error", False),
      "duration_ms": compute_duration(session_id, tool_name),
      # Notification only:
      "notification_type": "generic",
      "notification_message": hook_input.get("message"),
      # Stop only:
      "stop_reason": "stop" if not hook_input.get("stop_hook_active") else "tool",
  }
  ```

  Remove `agent_name` field — it was sent via `CLAUDE_AGENT_NAME` which is not a real variable and is not consumed anywhere in the pipeline.

  ### Existing structure to preserve

  - The JSON-RPC 2.0 envelope (`{"jsonrpc": "2.0", "method": "hamlet/event", "params": {...}}`)
  - The HTTP POST to `http://localhost:8080/hamlet/event`
  - The 1-second timeout
  - The `sys.exit(0)` in `finally`
  - The `try/except Exception` wrapper

  ## Verification

  After this work item, run a Claude Code session with hooks active. Check `~/.hamlet/hooks.log` — it should be empty (no errors). Check the Hamlet TUI — agents should show types other than GENERAL, structures should accumulate work, and the status bar should show a human-readable project name.
