notes: |
  # WI-205: Daemon port conflict detection and warning

  ## Context

  When `hamlet service install` is used, the daemon runs as a launchd background service. If a user then runs `hamlet daemon` while the service is active, both processes attempt to bind the same port. Currently this produces an unguided socket error. This work item adds a pre-flight check to `hamlet daemon` that detects the conflict, identifies whether the existing listener is hamlet, and exits cleanly with a helpful message.

  ## File to modify

  `src/hamlet/cli/commands/daemon.py`

  Look for `_run_daemon(port)` (the async function called by `daemon_command`). Add the port check before the call to `build_components()`.

  ## Implementation Notes

  ### Port check helper

  Add to `daemon.py` (stdlib only — no new imports beyond `socket` and `urllib.request` which may already be available):

  ```python
  import socket
  import urllib.request
  import json

  def _check_port_conflict(port: int) -> str | None:
      """
      Returns None if the port is free.
      Returns "hamlet" if hamlet daemon is already running on this port.
      Returns "other" if something else is using the port.
      """
      with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as s:
          s.settimeout(0.5)
          if s.connect_ex(("localhost", port)) != 0:
              return None  # port is free
      # Port is in use — check if it's hamlet
      try:
          with urllib.request.urlopen(
              f"http://localhost:{port}/hamlet/health", timeout=1
          ) as resp:
              if resp.status == 200:
                  return "hamlet"
      except Exception:
          pass
      return "other"
  ```

  ### Integration point in daemon_command / _run_daemon

  In `daemon_command(args)` (the sync entry point), before calling `asyncio.run(_run_daemon(port))`, add:

  ```python
  conflict = _check_port_conflict(port)
  if conflict == "hamlet":
      print(
          f"Error: hamlet daemon is already running on port {port}.\n"
          f"  Check status:  hamlet service status\n"
          f"  Stop service:  hamlet service stop\n"
          f"  Or stop the foreground daemon with Ctrl+C if it is running in another terminal."
      )
      sys.exit(1)
  elif conflict == "other":
      print(
          f"Error: port {port} is already in use by another process.\n"
          f"  Use --port to specify a different port, or stop the conflicting process."
      )
      sys.exit(1)
  ```

  ### Tests (tests/test_cli_daemon.py)

  Add to the existing test file. Mock `_check_port_conflict` (or mock `socket.socket` and `urllib.request.urlopen`):

  ```python
  def test_daemon_port_free_proceeds():
      # _check_port_conflict returns None → startup proceeds normally

  def test_daemon_port_in_use_hamlet_exits():
      # _check_port_conflict returns "hamlet" → prints warning, sys.exit(1)

  def test_daemon_port_in_use_other_exits():
      # _check_port_conflict returns "other" → prints warning, sys.exit(1)
  ```

  Follow the existing test patterns in `tests/test_cli_daemon.py` for how daemon startup is tested.

  ## Key Points

  - The port check must happen before `asyncio.run()` — it is synchronous and cheap
  - Use `sys.exit(1)` (not raising an exception) to match the existing pattern in `daemon_command`
  - The error message for the "hamlet" case should mention `hamlet service stop` and `hamlet service status` even though those commands are added in WI-204 — the message is just a string, not a code dependency
  - `_check_port_conflict` should be a module-level function (not nested) so it can be mocked in tests
