  # WI-276: Kitty graphics protocol layer

  ## Context
  The Kitty graphics protocol uses APC (Application Program Command) terminal escape sequences to transmit and display images. Pure Python — no C library needed.

  ## Protocol Format

  APC sequence: `\x1b_G<key>=<value>,<key>=<value>;<base64_payload>\x1b\\`

  Key parameters:
  - `a` = action: `t` (transmit), `p` (display/put), `d` (delete)
  - `f` = format: `100` (PNG)
  - `i` = image ID (unsigned 32-bit)
  - `s`, `v` = width, height in pixels
  - `m` = more data: `1` for intermediate chunks, `0` for final

  ## Chunking
  Images > 4096 bytes base64 must be split across multiple APC sequences. First chunk includes full header, subsequent chunks use `m=0` or `m=1` only.

