notes: |
  # WI-142: Fix HelpOverlay visibility mechanism

  ## Context
  `HelpOverlay` declares `visible: reactive[bool] = reactive(False)` which shadows Textual's `DOMNode.visible` framework property. This breaks Textual's internal layout calculations. Additionally, `HelpOverlay` extends `Static` which has `can_focus = False`, making the widget's own `on_key` handler and `BINDINGS` permanently unreachable.

  WI-135 already moved the `?` binding to `HamletApp.BINDINGS` and uses `overlay.display = not overlay.display` вҖ” this is the right approach. The fix here removes the broken reactive and ensures consistent display control.

  ## Existing Code
  - `src/hamlet/tui/help_overlay.py` вҖ” has `visible: reactive[bool]`, `watch_visible`, `on_key`, `BINDINGS`
  - `src/hamlet/tui/app.py` вҖ” `action_toggle_help` uses `overlay.display = not overlay.display`

  ## Changes to `src/hamlet/tui/help_overlay.py`

  Remove:
  - `visible: reactive[bool] = reactive(False)`
  - `watch_visible()` method
  - `on_key()` method (app.py handles ? via BINDINGS)
  - `BINDINGS` tuple (bindings moved to HamletApp)

  Keep:
  - `DEFAULT_CSS = "HelpOverlay { display: none; }"` (ensures hidden on startup)
  - `render()` method (unchanged)

  Result:
  ```python
  class HelpOverlay(Static):
      """Modal overlay showing keyboard controls. Toggled by ?."""

      DEFAULT_CSS = "HelpOverlay { display: none; }"

      def render(self) -> str:
          return (
              "в”Ңв”Җ Help в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n"
              "в”Ӯ  Arrow keys / hjkl вҖ” scroll          в”Ӯ\n"
              "в”Ӯ  f вҖ” toggle follow mode              в”Ӯ\n"
              "в”Ӯ  / вҖ” legend                          в”Ӯ\n"
              "в”Ӯ  ? вҖ” this help menu                  в”Ӯ\n"
              "в”Ӯ  q вҖ” quit                            в”Ӯ\n"
              "в”Ӯ                                      в”Ӯ\n"
              "в”Ӯ  Press ? to toggle  вҖў  Esc to close  в”Ӯ\n"
              "в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
          )
  ```

  ## Changes to `src/hamlet/tui/app.py`
  Add `Escape` binding when help is visible. The cleanest approach: add an `Escape` binding in `HamletApp.BINDINGS` that calls `action_close_help` вҖ” but only trigger it when overlay is visible.

  Or simpler: modify `action_toggle_help` to act as close when overlay is visible:
  ```python
  def action_toggle_help(self) -> None:
      try:
          overlay = self.query_one(HelpOverlay)
          overlay.display = not overlay.display
      except Exception as exc:
          logger.debug("toggle_help: %s", exc)
  ```
  This already handles both open and close. The `Escape` binding can route to `action_toggle_help` only when overlay is displayed вҖ” check if Textual supports conditional binding activation.

  ## Notes
  - Read the actual files before making changes вҖ” verify current state of help_overlay.py and app.py
  - The `action_toggle_help` in app.py (WI-135) uses `overlay.display` not `overlay.visible` вҖ” this is correct, keep it
  - Escape handling: if Textual doesn't support conditional bindings, add a separate `action_close_help` that only acts when overlay is displayed
