notes: |
  # WI-279: Multi-resolution zoom for Kitty

  ## Context
  Replaces `gui/notcurses/zoom.py`. Removes notcurses blitter constants, uses `render_mode` string instead.

  ## Implementation
  ```python
  class ZoomLevel(IntEnum):
      CLOSE = 0   # 16x16 sprites
      MEDIUM = 1  # 8x8 sprites
      FAR = 2     # 1x1 character cell

  @dataclass(frozen=True)
  class ZoomConfig:
      level: ZoomLevel
      tile_pixels: int
      render_mode: str  # "sprite" or "character"
  ```

  Cycling: `next_zoom` and `prev_zoom` use modular arithmetic on IntEnum values.

  ## Differences from notcurses zoom
  - No `NCBLIT_*` constants
  - `render_mode` is a plain string, not a C enum
  - No dependency on bindings module
