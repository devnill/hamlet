  # Execution Strategy — refine-21: Fix StatusBar, validation schema, Kitty test gaps
  
  ## Mode
  Batched parallel — all four items are independent with no shared file scope.
  
  ## Work items
  
  | ID | Title | Complexity | Key files |
  |----|-------|------------|-----------|
  | WI-287 | Wire _update_state into refresh loop | low | src/hamlet/tui/app.py |
  | WI-288 | Fix validation schema error field type | low | src/hamlet/mcp_server/validation.py |
  | WI-289 | Add agent symbol assertion to Kitty integration test | low | tests/test_kitty_integration.py |
  | WI-290 | Add empty-state Kitty integration test | low | tests/test_kitty_integration.py, tests/fixtures/daemon_state_empty.json |
  
  ## Dependency graph
  ```
  287 ─┐
  288 ─┤  (all independent)
  289 ─┤
  290 ─┘
  ```
  
  Note: WI-289 and WI-290 both modify `tests/test_kitty_integration.py`. Execute them sequentially (289 then 290) to avoid merge conflicts, or use a single agent for both.
  
  ## Parallelism
  - Group A (parallel): WI-287, WI-288
  - Group B (sequential): WI-289 → WI-290
  
  ## Agent configuration
  - Model: sonnet for all items (low complexity, well-scoped fixes)
  - Worktree: not needed (small changes, no conflict risk within groups)
  
  ## Review cadence
  - Review after all four items complete (single cycle review)
  
  ## Testing
  - All items: pytest must pass with no regressions
  - WI-287: Manual verification recommended — run `hamlet` viewer against live daemon, confirm status bar updates
