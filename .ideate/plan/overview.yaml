id: overview
type: overview
content: |-
  ## Change Plan — Viewport Cursor with Info Display

  **Trigger**: New feature request — user wants visual feedback about what's under the viewport center and ability to navigate between villages.

  **Scope**: ASCII/Textual backend only. No changes to Kitty backend, world simulation, or persistence.

  ### What's Changing

  1. **Cursor visibility at viewport center** — A cursor character appears at viewport center after movement keys, fades after 3 seconds of inactivity.

  2. **Cursor summary in status bar** — Shows information about the item at viewport center (agent type/activity, structure type/tier, village name, or terrain type).

  3. **Village menu overlay** — Press 'v' to list all villages with counts, select to jump viewport to that village.

  ### Scope Boundary

  **In scope:**
  - New modules: `tui/cursor.py`, `tui/cursor_overlay.py`, `tui/village_menu.py`
  - Modifications: `tui/app.py`, `tui/status_bar.py`, `world_state/manager.py`
  - New tests: `test_cursor.py`, `test_cursor_overlay.py`, `test_village_menu.py`
  - Integration tests in `test_tui_app.py`

  **Not in scope:**
  - Kitty graphical backend changes
  - World simulation changes
  - Persistence/database changes
  - Hook system changes

  ### Work Items

  | ID | Title | Complexity | Dependencies |
  |----|-------|------------|--------------|
  | WI-295 | Add CursorState to track visibility and selection | small | none |
  | WI-296 | Implement CursorOverlay widget | small | WI-295 |
  | WI-297 | Display cursor summary in StatusBar | medium | WI-295 |
  | WI-298 | Add VillageMenu overlay with jump functionality | medium | none |
  | WI-299 | Wire cursor to movement keys and integrate | small | WI-295, WI-296, WI-297, WI-298 |

  ### Dependency Graph

  ```
  WI-295 (CursorState)
     |
     +---> WI-296 (CursorOverlay)
     |
     +---> WI-297 (StatusBar summary)
     
  WI-298 (VillageMenu) [parallel with above]
     
  WI-295 + WI-296 + WI-297 + WI-298
     |
     +---> WI-299 (Integration)
  ```

  ### Expected Impact

  - **User experience**: Clearer understanding of what's at viewport center; easier navigation between villages
  - **Code impact**: New overlay widgets following existing patterns (LegendOverlay, HelpOverlay); minor StatusBar extension
  - **Performance**: Negligible — cursor visibility check is O(1), summary query uses existing viewport bounds

  ### Guiding Principles Alignment

  - **GP-1 (Visual Interest)**: Cursor adds visual feedback without cluttering the view
  - **GP-7 (Graceful Degradation)**: Cursor fades away if not interacted with
  - **GP-11 (Low-Friction Setup)**: No new configuration required
