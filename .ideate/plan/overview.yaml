id: overview
type: overview
title: "Refinement: Fix stale marketplace hooks and prevent version drift"
summary: The marketplace plugin (v0.5.0) ships hooks that read tool_name from a nested data object, but Claude Code now sends it at the top level. This silently breaks tool-name capture for ALL projects, causing villages to appear empty (0 structures despite thousands of events). The local source already has the correct hook code. This refinement bumps the plugin version to trigger a marketplace update, adds a test to prevent future version drift between plugin.json and __init__.py, and adds hook staleness detection to hamlet doctor.
trigger: "User observed ideate project listed as 'test village' with minimal visual activity despite being the most active project (~7K events). Root cause: installed hooks from marketplace cache don't match local source."
scope_boundary:
  changing:
    - Bump .claude-plugin/plugin.json version to match __init__.py (0.7.2)
    - Add pytest test enforcing plugin.json == __init__.py version
    - Embed __version__ in hooks/hamlet_hook_utils.py matching package version
    - Add hook version staleness check to hamlet doctor
  not_changing:
    - Hook script logic (already correct in local source)
    - Marketplace publishing flow
    - Hook registration mechanism (hooks.json)
    - Architecture, guiding principles, constraints
expected_impact: After marketplace publishes the updated plugin, all users get working hooks that correctly capture tool names. Future version drift is caught by CI. Users can run hamlet doctor to detect stale hooks after updates.
