id: interviews/legacy
type: interview
cycle: null
source_path: steering/interview.md
entries:
  - {id: IQ-legacy-001, question: What triggers a hook to fire? Are you looking to instrument all Claude Code hooks (PreToolUse, PostToolUse, Notification, etc.), or a subset?, answer: I want every single hook to be implemented, both for a variety of animations and maximum observability., domain: null, seq: 1}
  - {id: IQ-legacy-002, question: What information should each hook provide to the script? For example, when PreToolUse fires, would you want the agent name, tool name, tool parameters, timestamp — what fields are essential for the visualization and what's just noise?, answer: Agent name, hook used, and some basic information about what its doing. Keep in mind that this is a observability platform under the guise of an idle game., domain: null, seq: 2}
  - {id: IQ-legacy-003, question: What technology stack do you prefer for the UI? You mentioned ASCII rendering initially with future higher-fidelity graphics — are you thinking a terminal-based TUI (like bubbletea/tcell in Go, or textual in Python), or a web-based UI that renders ASCII now and can evolve to pixel graphics later?, answer: Terminal based is ideal. I want it to look and feel extremely like games like dwarf fortress or adom- lots of ascii characters that have meaning behind them- to an experienced player the text fades away and they just see what the characters represent., domain: null, seq: 3}
  - {id: IQ-legacy-004, question: Which terminal UI framework? Go with bubbletea/tcell, Python with textual, Rust with ratatui, or something else?, answer: "I'm not sure whats out there. Lets go with whatever is best to iterate on based on the current requirements.

Research was spawned to investigate TUI frameworks and MCP patterns. Result: Python/Textual recommended for async-native architecture, hot reload, and official MCP SDK support.", domain: null, seq: 4}
  - {id: IQ-legacy-005, question: How should agents be identified and visualized? When a new Claude Code agent spawns, should it automatically appear as a new villager, or is there a registration/enrollment step? And what determines an agent's visual appearance — random assignment, or tied to some property of the agent?, answer: When they spawn, they should just pop on to the screen next to the parent which spawned them. They should be an @ sign like a humanoid in roguelikes., domain: null, seq: 5}
  - {id: IQ-legacy-006, question: If all agents are `@`, how do you distinguish between them? Different colors for different agent types? Or are they visually identical and you identify them by position and the log?, answer: Colors. Please make sure to research roguelike games and understand how iconography works as it is pretty important for the task. It might also be helpful if the app is mildly aware of progress in tasks so we have have the characters build things in their little world.

Research was spawned for roguelike iconography and Claude Code hooks., domain: null, seq: 6}
  - {id: IQ-legacy-007, question: "When you say agents should \"build things in their little world\" based on task progress — what kind of things? Are we talking about structures that appear (houses, workshops), terrain changes, resources accumulating? And what's the visual relationship between an agent's activity and the world changing?", answer: Yes exactly, in ADOM or dwarf fortress you often see structures in a town being built. This should do exactly that. The amount they work should roughly map to the number of tokens spent. As work continues, workers might rebuild from wooden building to stone, make roads, etc. As time goes on, the screen should fill up and the workers should expand outward. One control the user should have is the ability to scroll, but in general workers should stay on the screen; this means that the screen should sometimes need to scroll as the workers move beyond the center as the village as it become a city., domain: null, seq: 7}
  - {id: IQ-legacy-008, question: "How should different agent actions map to world changes? For example: a `Read` tool hook might show an agent studying at a desk, while a `Write` hook shows construction. Should specific tools correlate to specific building types or activities?", answer: Yes, they should. This is subject to change, but design around the agents having specific activities that they do based on hook. It should be designed in a way that that could be modular and we could try out different types of animations., domain: null, seq: 8}
  - {id: IQ-legacy-009, question: For the status line and expandable log — what information should each log entry contain? Should it show tool name, agent name, timestamp, result (success/fail)? And for the expanded log view, should there be filtering, search, or just chronological scroll?, answer: Yes, for now it can just be a scroll. There will be a ton of events so it won't be super useful, but it is a nice indicator of what is generally happening., domain: null, seq: 9}
  - {id: IQ-legacy-010, question: How should agent colors be assigned? Random per agent, or deterministic based on some property (agent type, parent session, task assignment)? And should there be a legend/key showing which color maps to which agent?, answer: Deterministic. A legend should be available in a different menu., domain: null, seq: 10}
  - {id: IQ-legacy-011, question: What property should determine the deterministic color — agent name, agent type (e.g., researcher, coder, planner), parent session, or something else?, answer: I think type makes the most sense. Other attributes should play into behavior as well. For example, agents on the same team or session should prefer to be close together. If an agent hasn't been heard from in a long time, maybe it could turn a greenish hue to look like a zombie, that kind of thing. Creativity and thematic consistency is key here., domain: null, seq: 11}
  - {id: IQ-legacy-012, question: Should village state persist across app restarts, or start fresh each time? And how should multiple concurrent Claude Code sessions be handled — one village per session, or a shared world where agents from different sessions coexist?, answer: I think a persistent session makes the most sense, but the map itself should be related to projects. A single codebase should be a single village that grows out. If there is encroachment, maybe the villagers will build a road and start a new village elsewhere., domain: null, seq: 12}
  - {id: IQ-legacy-013, question: How should projects be identified — by directory path, by project name from git/CLAUDE.md, or some other identifier? And when a new village is founded (roads built to new settlement), should that be automatic when crowding hits a threshold, or player-controlled?, answer: One other thought on the previous q - the persistent map should track all projects ever worked on - this is a global map that has lots of little villages. For the id - This should be configured in the tools that run in each claude code session. It should look for a config file which sets this information and it'll be sent over mcp., domain: null, seq: 13}
  - {id: IQ-legacy-014, question: What should the config file contain beyond project identity? Project name, project type, team/session info? And what format — JSON, YAML, TOML, or should it use existing Claude Code settings structure?, answer: For now, just project name and mcp configuration is fine (e.g. where to ship the data to)., domain: null, seq: 14}
  - {id: IQ-legacy-015, question: Claude Code can fire many hooks per second (multiple tool calls in quick succession). How should the UI handle rapid events — queue them and animate sequentially, show only the latest state, or aggregate multiple events into single visual actions?, answer: We can debounce similar actions, but in general we want more work in claude code to yield a more visually interesting and frenetic screen., domain: null, seq: 15}
  - {id: IQ-legacy-016, question: "What are the agent states and how should they be visually represented? For example: actively working (animated), idle/waiting (static or subtle animation), completed task (brief celebration?), blocked (waiting on something)? And how long should animations take before returning to idle state?", answer: That all makes sense. Please use your best judgement to create thematically accurate animations, but remember that we can iterate later., domain: null, seq: 16}
  - {id: IQ-legacy-017, question: Based on the research, Python with Textual offers the best iteration speed and MCP ecosystem integration (official Python MCP SDK, async-native for concurrent UI + server). Should I proceed with Python/Textual, or do you have concerns about that choice?, answer: Lets do it., domain: null, seq: 17}
  - {id: IQ-legacy-018, question: "For the MCP architecture: should this be a single persistent server process that multiple Claude Code sessions connect to, or does each session spawn its own server instance? And for persistent world state, what storage format — SQLite for structured queries, or JSON file for simplicity?", answer: Yes, multiple sessions must be able to call into the single tool. SQLite is ideal., domain: null, seq: 18}
  - {id: IQ-legacy-019, question: How should the hook scripts be installed in Claude Code — does the user manually add them to their `~/.claude/settings.json`, or should the app provide a setup command that configures hooks automatically?, answer: The mcp server should be bundled with a skill that can configure the project, hooks and all. Its important that it is nondestructive and doesn't interfere with other parts of claude code. Ultimately we want the client to be as lean as possible, even if that means that additional processing happens on the other side. Also, instead of a skill in the previous question, it could be a command if that also would work., domain: null, seq: 19}
  - {id: IQ-legacy-020, question: What should I call this project? And for deployment — should this be a pip-installable Python package, a single script, or something else? How do you envision users installing and running it?, answer: This project is called hamlet. For now the tool should be a python app that could be published to pip, but we will save deployment and packaging to a future cycle., domain: null, seq: 20}
  - {id: IQ-legacy-021, question: "What's explicitly out of scope for the first iteration? For example: tile-based graphics (vs ASCII), sound effects, multiplayer viewing, replay/history scrubbing, export features?", answer: Yes, all of that is out of scope. Lets keep the MVP usable but able to be iterated on., domain: null, seq: 21}
  - {id: IQ-legacy-022, question: How should the system handle failures — if the MCP server is down when Claude Code tries to send an event, should hooks fail silently, log an error, or block until the server recovers? And what happens to the UI if no events are received for an extended period?, answer: We can discard messages for now. This is starting as a idle game with the idea that the underlying architecture could be useful as a observability tool later on., domain: null, seq: 22}
  - {id: IQ-legacy-023, question: How do we determine agent type from hook events? The research shows no dedicated agent spawning hooks — type must be inferred from tool call patterns or passed explicitly via config., answer: We can have some minimal processing on the side collecting telemetry to describe what is going on, but we just want to keep it as minimal as possible. Figure out what's needed., domain: null, seq: 23}
  - {id: IQ-legacy-024, question: For structure mapping, which tools map to which building types?, answer: We just need to be able to iterate. It doesn't need to be a perfect mapping as long as the screen is visually interesting., domain: null, seq: 24}
  - {id: IQ-legacy-025, question: Guiding principles still apply?, answer: (User delegated to best judgment) All principles confirmed unchanged., domain: null, seq: 25}
  - {id: IQ-legacy-026, question: PLANNER AgentType — add an inference rule or mark as reserved?, answer: (User delegated to best judgment) Mark as reserved with a comment in inference/rules.py. No TYPE_RULE to add until a distinguishing tool pattern is identified., domain: null, seq: 26}
  - {id: IQ-legacy-027, question: "Hook script field nesting — update architecture.md to document flat format, or restructure hooks to nest under \"data\" and update EventProcessor?", answer: (User delegated to best judgment) Update architecture.md to document flat format as canonical. The implementation is internally consistent; changing to nested would add cost with no functional benefit., domain: null, seq: 27}
  - {id: IQ-legacy-028, question: Viewport center persistence — address in Cycle 004 or defer?, answer: (User delegated to best judgment) Defer. Viewport resetting to the first village on restart is acceptable for MVP. Critical path is hooks and village mechanics., domain: null, seq: 28}
  - {id: IQ-legacy-029, question: PATH registration — pip installs the `hamlet` entry point into its bin directory. Is that sufficient, or do you want the service install command to also symlink into /usr/local/bin?, answer: That answers the request — pip's entry point registration is sufficient. No additional PATH work needed., domain: null, seq: 29}
  - {id: IQ-legacy-030, question: Command structure for service management — `hamlet service` as a subcommand group (install/uninstall/start/stop/status/restart)?, answer: Yes. `hamlet service` subcommand group is the right structure., domain: null, seq: 30}
  - {id: IQ-legacy-031, question: Granular control — beyond install/uninstall, do you want start/stop/status/restart commands?, answer: Yes, full granular control., domain: null, seq: 31}
  - {id: IQ-legacy-032, question: When `hamlet daemon` is run while the launchd service is already running, what should happen?, answer: The foreground daemon will fail due to a port conflict. A warning message is sufficient — detect the conflict, warn the user, and quit cleanly., domain: null, seq: 32}
  - {id: IQ-legacy-033, question: Upgrade flow — is `pip install --upgrade hamlet` followed by `hamlet service restart` sufficient?, answer: Yes. No new command needed for upgrades., domain: null, seq: 33}
  - {id: IQ-legacy-034, question: Guiding principles still apply?, answer: Yes, all principles confirmed unchanged., domain: null, seq: 34}
  - {id: IQ-legacy-035, question: What specific changes do you want to make?, answer: "World terrain generation — a global terrain map generated from seed, visible in the TUI as ASCII tiles, affecting gameplay by restricting structure placement. Villages should be automatically placed on passable terrain. Future: agent movement, geography-specific structures, roads, faster building.", domain: null, seq: 35}
  - {id: IQ-legacy-036, question: Why terrain first?, answer: Terrain is a breaking change to data structures. It affects where villages can be placed and enables future features. Must be done before other geography-dependent features., domain: null, seq: 36}
  - {id: IQ-legacy-037, question: How should villages be placed relative to terrain?, answer: Automatic placement. The game should search for passable terrain near the world origin. Terrain should be deterministic based on seed., domain: null, seq: 37}
  - {id: IQ-legacy-038, question: Should terrain be stored or generated?, answer: Deterministic generation from seed. Persist only the seed in world_metadata table. No migration needed., domain: null, seq: 38}
  - {id: IQ-legacy-039, question: What terrain types and how should they affect gameplay?, answer: WATER (impassable), MOUNTAIN (impassable), FOREST, MEADOW, PLAIN (all passable). Structures cannot be built on water or mountains., domain: null, seq: 39}
  - {id: IQ-legacy-040, question: How should terrain render?, answer: "ASCII tiles: `~` water, `^` mountain, `♣` forest, `\"` meadow, `.` plain. Render as background layer, then structures, then agents.", domain: null, seq: 40}
  - {id: IQ-legacy-041, question: What specific changes do you want to make?, answer: Allow the daemon to be easily configured through the app. A settings menu accessible at minimum for daemon port number. Also configurable village spacing (how far villages spawn from one another)., domain: null, seq: 41}
  - {id: IQ-legacy-042, question: Where should the settings menu be accessible?, answer: Standalone command — `hamlet settings` CLI., domain: null, seq: 42}
  - {id: IQ-legacy-043, question: Should village spacing be configurable or just documented?, answer: Make it configurable — add min_village_distance to settings., domain: null, seq: 43}
  - {id: IQ-legacy-044, question: TUI form or CLI get/set?, answer: CLI get/set. `hamlet settings` shows current, `hamlet settings set key value` modifies., domain: null, seq: 44}
  - {id: IQ-legacy-045, question: Which settings should be editable?, answer: Key settings only — the ones users are most likely to change (port, village distance, zombie thresholds, terrain)., domain: null, seq: 45}
  - {id: IQ-legacy-046, question: Should settings changes require daemon restart?, answer: Hot reload — daemon should pick up changes without restart., domain: null, seq: 46}
  - {id: IQ-legacy-047, question: Hot reload implementation approach?, answer: Periodic re-read — daemon checks config.json every N seconds (simple, no new deps)., domain: null, seq: 47}
  - {id: IQ-legacy-048, question: Any other changes?, answer: That's everything for this cycle., domain: null, seq: 48}
  - {id: IQ-legacy-049, question: Do guiding principles still hold?, answer: All still hold., domain: null, seq: 49}
  - {id: IQ-legacy-050, question: The plan conflicts with Design Constraint 1 (ASCII-only rendering). How should this be resolved?, answer: Change the constraint. ASCII should always be available for any terminal but we should support multiple backends for better UI when the device supports it., domain: null, seq: 50}
  - {id: IQ-legacy-051, question: Should the notcurses backend be selected via CLI flag, auto-detected, or both?, answer: We should have a flag with the default being settable in the settings tool., domain: null, seq: 51}
  - {id: IQ-legacy-052, question: How should the ctypes bindings be packaged?, answer: Don't want to require brew. Bundled ctypes bindings with runtime detection via find_library() — the Pythonic pattern used by Pillow, pygame, cryptography., domain: null, seq: 52}
  - {id: IQ-legacy-053, question: What sprite resolution?, answer: "Want a 16-bit SNES-style aesthetic. Like to zoom in and out, so different resolutions at different zoom levels — 16x16 close, 8x8 medium, character-based far. Think Stardew Valley or Thronglets from Black Mirror's \"Plaything.\"", domain: null, seq: 53}
  - {id: IQ-legacy-054, question: Should we investigate Kitty protocol passthrough in tmux?, answer: Simple split — Textual for tmux, notcurses for capable terminals., domain: null, seq: 54}
  - {id: IQ-legacy-055, question: Should GP-3 (Thematic Consistency) be expanded?, answer: Rework it. This is a simulation-style idle game. In terminal, Dwarf Fortress/ADOM makes sense. In 16-bit, SNES sim game style., domain: null, seq: 55}
  - {id: IQ-legacy-056, question: Scope boundary — only renderer + abstraction + settings?, answer: Correct. Don't touch core., domain: null, seq: 56}
  - {id: IQ-legacy-057, question: Do guiding principles still apply?, answer: Yes. GP-3 updated to reference Kitty instead of notcurses. Design Constraint 1 updated to specify pure Python requirement for graphical backend., domain: null, seq: 57}
  - {id: IQ-legacy-058, question: Should the gui/notcurses/ directory be deleted entirely, or kept as dead code?, answer: Delete it. This was a failed experiment., domain: null, seq: 58}
  - {id: IQ-legacy-059, question: Should the Kitty backend support all three zoom levels from the start, or start with character-mode?, answer: Completely replace notcurses with Kitty. Identical scope — all three zoom levels (16x16 sprites, 8x8 medium, character-based far)., domain: null, seq: 59}
  - {id: IQ-legacy-060, question: Cycle 015 findings — address now, defer, or dismiss?, answer: "Address all findings. The Kitty backend replacement naturally resolves most of them:
- Q-10 (ROAD symbol crash): Kitty renderer must use SymbolConfig with proper fallback
- Q-11 (terrain not connected): Kitty app must connect to terrain endpoint
- Q-15 (legend no-op): Kitty app must implement legend overlay
- Q-20 (architecture.md): Update with Kitty backend documentation
- Q-12 (SpriteSheet invalidation): Redesign in Kitty sprite system
- Q-13 (destroy_plane): N/A — no native planes in pure Python Kitty approach", domain: null, seq: 60}
  - {id: IQ-legacy-061, question: What is the fix?, answer: Import _parse_agent, _parse_structure, _parse_village from tui/remote_world_state.py in the state fetcher. Parse raw dicts into proper dataclass objects before storing in StateSnapshot. Same pattern the Textual viewer uses., domain: null, seq: 61}
  - {id: IQ-legacy-062, question: Do the guiding principles still hold?, answer: Yes, all 11 principles still hold., domain: null, seq: 62}
  - {id: IQ-legacy-063, question: Are you here to address cycle 017 findings, to make other changes, or both?, answer: "(Implicit) User reported live bugs. Debugging revealed: (1) _update_state() in HamletApp is dead code — nothing calls it, so StatusBar/EventLog never update; (2) EVENT_SCHEMA error field typed as object-null but PostToolUseFailure hook sends strings — events get 400-rejected. User confirmed seeing one agent on the map but status bar showing zeros. Scope expanded to also address cycle 017 significant findings (G1: agent @ symbol not tested, G2: empty state not tested).", domain: null, seq: 63}
  - {id: IQ-legacy-064, question: Should the refinement include all four items (2 live bugs + 2 test gaps)?, answer: All 4., domain: null, seq: 64}
  - {id: IQ-legacy-065, question: Anything about execution strategy that should change?, answer: No — all items are low complexity. Batched parallel execution appropriate., domain: null, seq: 65}
