  - {id: IQ-009-001, question: What's driving this refinement — addressing the test coverage gap from the cycle 008 review, adding new functionality, or something else?, answer: This cycle should focus solely on quality — test coverage, documentation, and any items to address sustainable development., domain: null, seq: 1}
  - {id: IQ-009-002, question: For test coverage — should hook script unit tests be included in scope, or only package test gaps?, answer: Yes to all., domain: null, seq: 2}
  - {id: IQ-009-003, question: "For documentation and sustainable development — which sub-areas are in scope? Options: code health fixes (enum identity, saver.py, startup deduplication); pre-existing functional gaps (Q-10 Bash schema, Q-6 health endpoint, Q-16 notification_type); documentation (README, QUICKSTART, CLAUDE.md, docstrings); architecture items (Any typing / Protocols, Q-13 stop_reason differentiation).", answer: All of the above., domain: null, seq: 3}
  - {id: IQ-009-004, question: "For stop_reason differentiation — should \"tool\" (interrupt) produce different state transitions than \"stop\" (clean exit)? Proposed: immediately mark agents IDLE and flush pending_tools when stop_reason=\"tool\", rather than waiting for zombie TTL.", answer: The zombie concept is just a thematic element when we can't infer the status of an agent. We should strive to match the intent in cases like this, as long as the telemetry is accurate., domain: null, seq: 4}
  - {id: IQ-009-005, question: For Any typing at module boundaries — Protocols or guarded imports?, answer: Protocols are better., domain: null, seq: 5}
